            border: 1px solid;
            letter-spacing: 0.01em;
        }

        /* ===== PRE / CODE ===== */
        pre { white-space: pre-wrap; word-break: break-all; }

        /* ===== PREMIUM FORM INPUTS ===== */
        .input {
            width: 100%;
            padding: .625rem 1rem;
            border: 1.5px solid #E0D7C7;
            border-radius: var(--radius-md);
            font-size: .875rem;
            outline: none;
            transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
            background: #FFFFFF;
            color: #4A4843;
        }
        .input:hover { border-color: rgba(57,70,58,0.1); }
        .input:focus {
            border-color: #39463A;
            box-shadow: 0 0 0 3px rgba(57, 70, 58, 0.1);
        }
        select.input { cursor: pointer; }
        select.input option {
            background: #FFFFFF;
            color: #4A4843;
        }
        select.input optgroup {
            background: #FFFFFF;
            color: #4A4843;
            font-weight: 600;
        }

        /* ===== PREMIUM BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            padding: .5rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: .875rem;
            border: none;
            transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0));
            pointer-events: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #39463A, #4A5A4B, #73868A);
            color: white;
            box-shadow: 0 0 20px rgba(171,138,122,0.2), 0 0 40px rgba(115,134,138,0.1);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(171,138,122,0.25), 0 0 50px rgba(115,134,138,0.15);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-secondary {
            background: #FFFFFF;
            color: #39463A;
            border: 1.5px solid #E0D7C7;
            box-shadow: var(--shadow-xs);
        }
        .btn-secondary:hover {
            background: #F5F1EB;
            border-color: rgba(57,70,58,0.15);
            transform: translateY(-1px);
        }
        .btn-amber {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #FFFFFF;
            box-shadow: 0 1px 3px rgba(249, 115, 22, 0.3);
        }
        .btn-amber:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.35);
        }

        /* ===== MAX SIZES ===== */
        .max-w-2xl { max-width: 42rem; }
        .max-h-96 { max-height: 24rem; }
        .max-h-40 { max-height: 10rem; }
        .h-2 { height: .5rem; }
        .h-3 { height: .75rem; }
        .h-6 { height: 1.5rem; }
        .h-48 { height: 12rem; }
        .h-80 { height: 20rem; }
        .w-3 { width: .75rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .w-8 { width: 2rem; }
        .h-8 { height: 2rem; }
        .w-10 { width: 2.5rem; }
        .h-10 { height: 2.5rem; }
        .w-12 { width: 3rem; }
        .h-12 { height: 3rem; }
        .w-20 { width: 5rem; }
        .h-20 { height: 5rem; }

        /* ===== SVG FILLS ===== */
        .fill-gray-500 { fill: rgba(57,70,58,0.45); }
        .fill-red-500 { fill: #ef4444; }

        /* Last child border removal */
        .last-no-border > *:last-child { border-bottom: none; }

        /* ===== PREMIUM SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(57,70,58,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(57,70,58,0.3); }
        .sidebar ::-webkit-scrollbar-thumb { background: rgba(225,215,199,0.15); }
        .sidebar ::-webkit-scrollbar-thumb:hover { background: rgba(225,215,199,0.25); }

        /* ===== PREMIUM CARD SYSTEM ===== */
        .card-premium {
            background: #FFFFFF;
            border-radius: var(--radius-xl);
            box-shadow: 0 4px 12px rgba(57,70,58,0.08), inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid #E0D7C7;
            transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-premium:hover {
            box-shadow: 0 8px 20px -2px rgba(171,138,122,0.15), inset 0 1px 0 rgba(255,255,255,0.6);
            border-color: rgba(171,138,122,0.3);
            transform: translateY(-2px);
        }

        /* ===== PREMIUM TABLE ===== */
        .table-premium { width: 100%; }
        .table-premium thead th {
            padding: .75rem 1rem;
            text-align: left;
            font-size: .75rem;
            font-weight: 600;
            color: rgba(57,70,58,0.6);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #F5F1EB;
            border-bottom: 2px solid #E0D7C7;
        }
        .table-premium tbody td {
            padding: .875rem 1rem;
            font-size: .875rem;
            color: #6B6660;
            border-bottom: 1px solid #E0D7C7;
        }
        .table-premium tbody tr { transition: background .15s ease; }
        .table-premium tbody tr:hover { background: rgba(57,70,58,0.02); }
        .table-premium tbody tr:last-child td { border-bottom: none; }

        /* ===== GLASS MORPHISM EFFECTS ===== */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(57, 70, 58, 0.1);
        }

        /* ===== PREMIUM PROGRESS BAR ===== */
        .progress-premium {
            width: 100%;
            height: .5rem;
            background: rgba(57,70,58,0.1);
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
        }
        .progress-premium .progress-fill {
            height: 100%;
            border-radius: 9999px;
            background: linear-gradient(90deg, #39463A, #4A5A4B, #73868A);
            transition: width .6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .progress-premium .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
            background-size: 200% 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    // ========== LOCALSTORAGE HELPERS ==========
    const PracticeStorageManager = {
        getPractices: () => {
            try {
                const data = window.localStorage.getItem('rcm_practices');
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        },
        savePractices: (practices) => {
            try {
                window.localStorage.setItem('rcm_practices', JSON.stringify(practices));
            } catch (e) {}
        },
        addPractice: (practice) => {
            const practices = PracticeStorageManager.getPractices();
            practice.id = practice.id || 'practice_' + Date.now();
            practices.push(practice);
            PracticeStorageManager.savePractices(practices);
            return practice;
        },
        updatePractice: (id, practice) => {
            const practices = PracticeStorageManager.getPractices();
            const idx = practices.findIndex(p => p.id === id);
            if (idx >= 0) {
                practices[idx] = { ...practice, id };
                PracticeStorageManager.savePractices(practices);
                return practices[idx];
            }
            return null;
        },
        deletePractice: (id) => {
            const practices = PracticeStorageManager.getPractices().filter(p => p.id !== id);
            PracticeStorageManager.savePractices(practices);
        },
        exportPractices: () => {
            const practices = PracticeStorageManager.getPractices();
            return JSON.stringify(practices, null, 2);
        },
        importPractices: (json) => {
            try {
                const practices = JSON.parse(json);
                if (Array.isArray(practices)) {
                    PracticeStorageManager.savePractices(practices);
                    return true;
                }
            } catch (e) {}
            return false;
        }
    };

    const ClaimsQueueManager = {
        getQueue: () => {
            try {
                const data = window.localStorage.getItem('rcm_claims_queue');
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        },
        saveQueue: (claims) => {
            try {
                window.localStorage.setItem('rcm_claims_queue', JSON.stringify(claims));
            } catch (e) {}
        },
        addClaim: (claim) => {
            const queue = ClaimsQueueManager.getQueue();
            claim.id = claim.id || 'claim_' + Date.now();
            claim.status = claim.status || 'queue';
            claim.createdAt = claim.createdAt || new Date().toISOString();
            queue.push(claim);
            ClaimsQueueManager.saveQueue(queue);
            return claim;
        },
        updateClaim: (id, updates) => {
            const queue = ClaimsQueueManager.getQueue();
            const idx = queue.findIndex(c => c.id === id);
            if (idx >= 0) {
                queue[idx] = { ...queue[idx], ...updates };
                ClaimsQueueManager.saveQueue(queue);
                return queue[idx];
            }
            return null;
        },
        removeFromQueue: (id) => {
            const queue = ClaimsQueueManager.getQueue().filter(c => c.id !== id);
            ClaimsQueueManager.saveQueue(queue);
        },
        exportQueue: (format = 'json') => {
            const queue = ClaimsQueueManager.getQueue();
            if (format === 'csv') {
                const csvEsc = (v) => { const s = String(v == null ? '' : v); return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s; };
                const headers = ['Practice Name','Practice Address','Practice TIN','Practice NPI','Claim ID','Flag Status','dateOfService','Patient First Name','Patient Last Name','dateOfBirth','Sex','Facility Name','Facility Address','Facility TIN','Facility NPI','Pay to Address','procedureCode','Units','Charge Amount','Location POS','modifiers','insurancePayerName','insurancePlanName','insurancePlanType','insurancePolicyIdentifier','insuranceGroupNumber','Patient Street Address1','Patient StreetAddress2','Patient City','Patient State','Patient PostalCode','HomePhone','MobilePhone','GuarantorRelation','GuarantorPrimaryPhone','GuarantorSecondaryPhone','GuarantorStreet','GuarantorCity','GuarantorState','GuarantorZip','DiagnosisCode1','DiagnosisCode2','DiagnosisCode3','DiagnosisCode4','DiagnosisCode5','DiagnosisCode6','DiagnosisCode7','DiagnosisCode8','DiagnosisCode9','DiagnosisCode10','DiagnosisCode11','DiagnosisCode12'];
                let csv = headers.join(',') + '\n';
                queue.forEach(c => {
                    const row = [
                        c.practiceName, c.practiceAddress, c.practiceTin, c.practiceNpi,
                        c.claimId || c.id, c.flagStatus, c.dateOfService,
                        c.patientFirstName, c.patientLastName, c.dateOfBirth, c.sex,
                        c.facilityName, c.facilityAddress, c.facilityTin, c.facilityNpi,
                        c.payToAddress, c.procedureCode, c.units, c.chargeAmount,
                        c.locationPos, c.modifiers,
                        c.insurancePayerName, c.insurancePlanName, c.insurancePlanType,
                        c.insurancePolicyIdentifier, c.insuranceGroupNumber,
                        c.patientStreet1, c.patientStreet2, c.patientCity, c.patientState, c.patientZip,
                        c.homePhone, c.mobilePhone,
                        c.guarantorRelation, c.guarantorPrimaryPhone, c.guarantorSecondaryPhone,
                        c.guarantorStreet, c.guarantorCity, c.guarantorState, c.guarantorZip,
                        c.diagnosisCode1, c.diagnosisCode2, c.diagnosisCode3, c.diagnosisCode4,
                        c.diagnosisCode5, c.diagnosisCode6, c.diagnosisCode7, c.diagnosisCode8,
                        c.diagnosisCode9, c.diagnosisCode10, c.diagnosisCode11, c.diagnosisCode12
                    ];
                    csv += row.map(csvEsc).join(',') + '\n';
                });
                return csv;
            }
            return JSON.stringify(queue, null, 2);
        }
    };

    // ========== REPORTS STORAGE MANAGER ==========
    const ReportsStorageManager = {
        getReports: () => {
            try {
                const data = window.localStorage.getItem('rcm_coding_reports');
                return data ? JSON.parse(data) : [];
            } catch (e) { return []; }
        },
        saveReports: (reports) => {
            try { window.localStorage.setItem('rcm_coding_reports', JSON.stringify(reports)); } catch (e) {}
        },
        addReport: (report) => {
            const reports = ReportsStorageManager.getReports();
            report.id = report.id || 'RPT-' + Date.now().toString(36).toUpperCase();
            report.createdAt = report.createdAt || new Date().toISOString();
            reports.unshift(report);
            ReportsStorageManager.saveReports(reports);
            return report;
        },
        deleteReport: (id) => {
            const reports = ReportsStorageManager.getReports().filter(r => r.id !== id);
            ReportsStorageManager.saveReports(reports);
        },
        clearAll: () => {
            try { window.localStorage.removeItem('rcm_coding_reports'); } catch (e) {}
        }
    };

    // Shared PDF report generator — Premium Modern Clinical (Canva-quality)
    const generateReportPdf = (report) => {
        if (typeof window.jspdf === 'undefined' || !window.jspdf.jsPDF) return null;
        var jsPDF = window.jspdf.jsPDF;
        var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        var pw = doc.internal.pageSize.getWidth();    // 210
        var ph = doc.internal.pageSize.getHeight();   // 297
        var m = 16;                                   // generous margins
        var cw = pw - m * 2;                          // content width
        var y = 0;

        // ─── PREMIUM COLOR SYSTEM ───
        var C = {
            pri: [14, 165, 233], priDk: [2, 132, 199], priLt: [224, 242, 254], priBg: [240, 249, 255],
            sec: [124, 58, 237], secLt: [245, 243, 255], secBg: [250, 245, 255],
            ok: [5, 150, 105], okLt: [209, 250, 229], okBg: [236, 253, 245],
            warn: [217, 119, 6], warnLt: [254, 243, 199], warnBg: [255, 251, 235],
            err: [220, 38, 38], errLt: [254, 226, 226], errBg: [254, 242, 242],
            d9: [15, 23, 42], d7: [51, 65, 85], d5: [100, 116, 139], d4: [148, 163, 184],
            d3: [203, 213, 225], d2: [226, 232, 240], d1: [241, 245, 249], wh: [255, 255, 255]
        };

        // ─── UTILITY FUNCTIONS ───
        var checkPage = function(need) { if (y + need > ph - 18) { doc.addPage(); y = 14; } };

        var txt = function(text, fs, bold, color, indent, maxW) {
            var ind = indent || 0; var mw = maxW || (cw - ind);
            doc.setFontSize(fs); doc.setTextColor.apply(doc, color || C.d7); doc.setFont('helvetica', bold ? 'bold' : 'normal');
            var lines = doc.splitTextToSize(String(text || ''), mw);
            var lh = fs * 0.38;
            checkPage(lines.length * lh + 2);
            doc.text(lines, m + ind, y);
            y += lines.length * lh + 1.5;
            return lines.length;
        };

        var gap = function(n) { y += (n || 2); };

        // Section with shaded header bar, rounded corners, accent stripe
        var section = function(title, helpText, accent) {
            var ac = accent || C.pri;
            checkPage(16); gap(4);
            // Shaded header bar
            doc.setFillColor(ac[0], ac[1], ac[2]); doc.roundedRect(m, y, cw, 8, 1.5, 1.5, 'F');
            doc.setFontSize(9.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(255, 255, 255);
            doc.text(title.toUpperCase(), m + 5, y + 5.5);
            y += 11;
            // Plain-language helper text under header
            if (helpText) {
                doc.setFontSize(7.5); doc.setFont('helvetica', 'italic'); doc.setTextColor.apply(doc, C.d5);
                var hl = doc.splitTextToSize(helpText, cw - 4);
                doc.text(hl, m + 2, y); y += hl.length * 3 + 2;
            }
        };

        var subsec = function(title) {
            checkPage(8); gap(2);
            doc.setFillColor.apply(doc, C.sec); doc.rect(m + 2, y - 1, 1.2, 5, 'F');
            doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.sec);
            doc.text(title, m + 6, y + 2.5); y += 7;
        };

        var body = function(t, ind) { return txt(t, 8.5, false, C.d7, ind || 3); };
        var small = function(t, ind) { return txt(t, 7.5, false, C.d5, ind || 5); };
        var label = function(t, ind) { txt(t, 7, true, C.d5, ind || 3); };
        var rule = function() { doc.setDrawColor.apply(doc, C.d2); doc.setLineWidth(0.25); doc.line(m, y, pw - m, y); y += 2; };

        var riskCol = function(r) { if (!r) return C.d5; var s = String(r).toLowerCase(); return s.indexOf('high') >= 0 || s.indexOf('critical') >= 0 ? C.err : s.indexOf('medium') >= 0 || s.indexOf('moderate') >= 0 || s.indexOf('mild') >= 0 ? C.warn : s.indexOf('low') >= 0 || s.indexOf('minimal') >= 0 ? C.ok : C.d5; };
        var riskBg = function(r) { if (!r) return C.d1; var s = String(r).toLowerCase(); return s.indexOf('high') >= 0 || s.indexOf('critical') >= 0 ? C.errBg : s.indexOf('medium') >= 0 || s.indexOf('moderate') >= 0 || s.indexOf('mild') >= 0 ? C.warnBg : s.indexOf('low') >= 0 || s.indexOf('minimal') >= 0 ? C.okBg : C.d1; };

        // Card box with optional accent stripe
        var card = function(x, w, h, bgColor, accentColor) {
            doc.setFillColor.apply(doc, bgColor || C.d1);
            doc.roundedRect(x, y, w, h, 2, 2, 'F');
            doc.setDrawColor.apply(doc, C.d2); doc.setLineWidth(0.2);
            doc.roundedRect(x, y, w, h, 2, 2, 'S');
            if (accentColor) { doc.setFillColor.apply(doc, accentColor); doc.rect(x, y + 2, 1.5, h - 4, 'F'); }
        };

        // Risk pill badge
        var badge = function(text, x, yy, color, bg) {
            var tw = doc.getTextWidth(text) + 4;
            doc.setFillColor.apply(doc, bg); doc.roundedRect(x, yy - 3, tw, 4.5, 1, 1, 'F');
            doc.setFontSize(6.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, color);
            doc.text(text, x + tw / 2, yy - 0.3, { align: 'center' });
        };

        var ag = report.auditGrade || 'N/A';
        var agCol = (ag === 'A' || ag === 'B') ? C.ok : ag === 'C' ? C.warn : C.err;

        // ═══════════════════════════════════════════════════════════
        //  PAGE 1 HEADER — Premium branded header
        // ═══════════════════════════════════════════════════════════
        // Top accent gradient bar
        doc.setFillColor(14, 165, 233); doc.rect(0, 0, pw, 2.5, 'F');
        doc.setFillColor(124, 58, 237); doc.rect(pw * 0.6, 0, pw * 0.4, 2.5, 'F');

        y = 10;
        doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.pri);
        doc.text('OPTEO HEALTH RCM PLATFORM', m, y);
        doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d5);
        doc.text(report.id || '', pw - m, y, { align: 'right' });
        y += 7;
        doc.setFontSize(20); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d9);
        doc.text('Medical Coding Report', m, y);
        y += 5;
        doc.setFontSize(8.5); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d5);
        doc.text('A comprehensive analysis of procedure codes, diagnosis codes, denial risk, and billing recommendations.', m, y);
        y += 4;
        doc.setFontSize(7.5); doc.setTextColor.apply(doc, C.d4);
        doc.text('Generated ' + (report.createdAt ? new Date(report.createdAt).toLocaleString() : new Date().toLocaleString()), m, y);
        y += 5;
        // Divider
        doc.setDrawColor.apply(doc, C.pri); doc.setLineWidth(0.6); doc.line(m, y, pw - m, y);
        y += 6;

        // ═══════════════════════════════════════════════════════════
        //  KEY METRICS DASHBOARD
        // ═══════════════════════════════════════════════════════════
        checkPage(26);
        var kpiW = (cw - 12) / 4;
        var kpis = [
            { lbl: 'AUDIT GRADE', sub: 'Overall coding quality score', val: ag, col: agCol, bg: (ag === 'A' || ag === 'B') ? C.okBg : ag === 'C' ? C.warnBg : C.errBg },
            { lbl: 'CONFIDENCE', sub: 'How certain the coding is correct', val: (report.overallConfidence || 0) + '%', col: C.pri, bg: C.priBg },
            { lbl: 'DENIAL RISK', sub: 'Likelihood the claim gets denied', val: report.denialRisk ? String(report.denialRisk.overall_risk || report.denialRisk.overallRisk || 'N/A').toUpperCase() : 'N/A', col: riskCol(report.denialRisk ? (report.denialRisk.overall_risk || report.denialRisk.overallRisk) : null), bg: riskBg(report.denialRisk ? (report.denialRisk.overall_risk || report.denialRisk.overallRisk) : null) },
            { lbl: 'TOTAL CHARGES', sub: 'Sum of all procedure charges', val: '$' + (report.cptCodes || []).reduce(function(s, c) { return s + (Number(c.charge) || 0); }, 0).toLocaleString('en-US', { minimumFractionDigits: 2 }), col: C.sec, bg: C.secBg }
        ];
        kpis.forEach(function(k, i) {
            var kx = m + i * (kpiW + 4);
            card(kx, kpiW, 22, k.bg);
            doc.setFontSize(6.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d5);
            doc.text(k.lbl, kx + kpiW / 2, y + 5, { align: 'center' });
            doc.setFontSize(16); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, k.col);
            doc.text(String(k.val), kx + kpiW / 2, y + 14, { align: 'center' });
            doc.setFontSize(5.5); doc.setFont('helvetica', 'italic'); doc.setTextColor.apply(doc, C.d4);
            doc.text(k.sub, kx + kpiW / 2, y + 19, { align: 'center' });
        });
        y += 28;

        // ═══════════════════════════════════════════════════════════
        //  PATIENT & PROVIDER
        // ═══════════════════════════════════════════════════════════
        section('Patient & Provider Information', 'Basic information about the patient being treated, the treating provider, and the facility where services were rendered.', C.pri);
        checkPage(26);
        var halfW = (cw - 6) / 2;

        // Patient card
        card(m, halfW, 22, C.priBg, C.pri);
        doc.setFontSize(6.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.pri);
        doc.text('PATIENT', m + 6, y + 5);
        doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d9);
        var ptName = ((report.patientLastName || '') + ', ' + (report.patientFirstName || '')).trim();
        doc.text(ptName || 'Not Provided', m + 6, y + 12);
        doc.setFontSize(7.5); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d5);
        doc.text('Date of Birth: ' + (report.patientDob || 'Not Provided'), m + 6, y + 16.5);
        doc.text('Sex: ' + (report.patientSex || 'N/A') + '    Account Number: ' + (report.patientAcct || 'N/A'), m + 6, y + 20);

        // Provider card
        var px2 = m + halfW + 6;
        card(px2, halfW, 22, C.secBg, C.sec);
        doc.setFontSize(6.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.sec);
        doc.text('RENDERING PROVIDER', px2 + 6, y + 5);
        doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d9);
        var prov = doc.splitTextToSize(report.providerName || 'Not Provided', halfW - 14);
        doc.text(prov[0] || '', px2 + 6, y + 12);
        doc.setFontSize(7.5); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d5);
        doc.text('National Provider Identifier (NPI): ' + (report.providerNpi || 'N/A'), px2 + 6, y + 16.5);
        doc.text((report.facilityName || 'N/A'), px2 + 6, y + 20);
        y += 26;

        // Detail row
        checkPage(10);
        doc.setFillColor.apply(doc, C.d1); doc.roundedRect(m, y, cw, 8, 1.5, 1.5, 'F');
        doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d5);
        var detailParts = [
            'Date of Service: ' + (report.dateOfService || 'N/A'),
            'Insurance Payer: ' + (report.payer || 'N/A'),
            'Specialty: ' + (report.specialty || 'N/A'),
            'Place of Service: ' + (report.placeOfService || 'N/A'),
            'State: ' + (report.stateCode || 'N/A')
        ];
        doc.text(detailParts.join('    |    '), m + 4, y + 5);
        y += 12;

        // ═══════════════════════════════════════════════════════════
        //  PROCEDURE SUMMARY
        // ═══════════════════════════════════════════════════════════
        if (report.procedureSummary) {
            section('Procedure Summary', 'A brief description of the medical procedures that were performed during this visit.', C.pri);
            doc.setFillColor.apply(doc, C.priBg); doc.roundedRect(m + 2, y - 1, cw - 4, 2, 0, 0, 'F');
            body(report.procedureSummary, 4);
            gap(2);
        }

        // ═══════════════════════════════════════════════════════════
        //  CPT / HCPCS PROCEDURE CODES & CHARGES
        // ═══════════════════════════════════════════════════════════
        if (report.cptCodes && report.cptCodes.length > 0) {
            section('Procedure Codes (CPT/HCPCS) & Charges',
                'Current Procedural Terminology (CPT) and Healthcare Common Procedure Coding System (HCPCS) codes identify the specific medical services performed. Each code is shown with its Medicare-allowed amount and the provider charge amount.',
                C.pri);

            // Table header
            checkPage(12);
            doc.setFillColor.apply(doc, C.d1); doc.roundedRect(m, y, cw, 6, 1, 1, 'F');
            doc.setFontSize(6.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d5);
            var cols = [['Code', 2], ['Description', 20], ['Units', 94], ['Modifiers', 106], ['Allowed', 126], ['Charge', 148], ['Denial Risk', 166]];
            cols.forEach(function(c) { doc.text(c[0], m + c[1], y + 4); });
            y += 8;

            var totA = 0, totC = 0;
            report.cptCodes.forEach(function(c, idx) {
                checkPage(10);
                // Alternating row shading
                if (idx % 2 === 0) { doc.setFillColor(250, 251, 255); doc.rect(m, y - 3.5, cw, 7, 'F'); }
                // Code in accent color
                doc.setFontSize(8.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.pri);
                doc.text(String(c.code || ''), m + 2, y);
                // Description
                doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d7);
                var desc = doc.splitTextToSize(String(c.description || ''), 70);
                doc.text(desc, m + 20, y);
                // Numeric fields
                doc.setFontSize(8); doc.setTextColor.apply(doc, C.d7);
                doc.text(String(c.units || 1), m + 97, y);
                doc.setTextColor.apply(doc, C.d5);
                doc.text(String((c.modifiers || []).join(', ') || '—'), m + 106, y);
                doc.setTextColor.apply(doc, C.d7);
                doc.text(c.medicareAllowable ? '$' + Number(c.medicareAllowable).toFixed(2) : '—', m + 126, y);
                doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d9);
                doc.text(c.charge ? '$' + Number(c.charge).toFixed(2) : '—', m + 148, y);
                // Risk badge
                if (c.denial_risk) { badge(String(c.denial_risk).toUpperCase(), m + 166, y, riskCol(c.denial_risk), riskBg(c.denial_risk)); }
                totA += (Number(c.medicareAllowable) || 0) * (c.units || 1);
                totC += Number(c.charge) || 0;
                y += Math.max(desc.length * 3, 5) + 2;
            });
            // Total row
            doc.setDrawColor.apply(doc, C.pri); doc.setLineWidth(0.5); doc.line(m, y, pw - m, y); y += 3;
            doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d9);
            doc.text('TOTALS', m + 2, y);
            doc.text('$' + totA.toLocaleString('en-US', { minimumFractionDigits: 2 }), m + 126, y);
            doc.setTextColor.apply(doc, C.sec);
            doc.text('$' + totC.toLocaleString('en-US', { minimumFractionDigits: 2 }), m + 148, y);
            y += 6;

            // Per-line denial risk details
            var risky = report.cptCodes.filter(function(c) { return c.denial_risk && String(c.denial_risk).toLowerCase() !== 'low'; });
            if (risky.length > 0) {
                subsec('Procedure Codes With Elevated Denial Risk');
                small('The following procedure codes have been flagged as having a moderate or high chance of being denied by the insurance payer. Review the reasons and ensure documentation supports medical necessity.', 4);
                gap(1);
                risky.forEach(function(c) {
                    checkPage(12);
                    doc.setFillColor.apply(doc, riskBg(c.denial_risk)); doc.roundedRect(m + 4, y - 2, cw - 8, 6, 1.5, 1.5, 'F');
                    txt(c.code + '  —  Risk Level: ' + String(c.denial_risk || 'Unknown').toUpperCase() + (c.denial_reason ? '  |  Reason: ' + c.denial_reason : ''), 8, false, riskCol(c.denial_risk), 7);
                    if (c.linked_icd10 && c.linked_icd10.length > 0) small('Linked Diagnosis Codes: ' + c.linked_icd10.join(', '), 9);
                    gap(1);
                });
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  DIAGNOSIS CODES (ICD-10) & HCC RISK ADJUSTMENT
        // ═══════════════════════════════════════════════════════════
        if (report.icd10Codes && report.icd10Codes.length > 0) {
            section('Diagnosis Codes (ICD-10) & Risk Adjustment (HCC)',
                'International Classification of Diseases, 10th Revision (ICD-10) codes describe the patient\'s medical conditions. Hierarchical Condition Categories (HCC) are used by Medicare and insurance payers to predict future healthcare costs. Diagnoses that map to an HCC carry a Risk Adjustment Factor (RAF) weight \u2014 a higher combined weight means the patient is expected to need more healthcare resources.',
                C.sec);

            report.icd10Codes.forEach(function(d, i) {
                checkPage(20);
                var ptr = String.fromCharCode(65 + i);
                var hasHcc = d.hcc_code && String(d.hcc_code).trim() !== '';
                var hasAlts = d.hcc_alternatives && d.hcc_alternatives.length > 0;
                var hasSpecImprov = d.specificity_improvement && String(d.specificity_improvement).trim() !== '';

                // Diagnosis card
                var cardH = 14 + (hasHcc ? 5 : 0);
                doc.setFillColor.apply(doc, i % 2 === 0 ? C.wh : C.d1);
                doc.roundedRect(m + 1, y - 2, cw - 2, cardH, 1.5, 1.5, 'F');
                doc.setDrawColor.apply(doc, C.d2); doc.setLineWidth(0.15);
                doc.roundedRect(m + 1, y - 2, cw - 2, cardH, 1.5, 1.5, 'S');

                // Letter badge
                doc.setFillColor.apply(doc, C.secBg); doc.circle(m + 6, y + 2, 3.5, 'F');
                doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.sec);
                doc.text(ptr, m + 6, y + 3, { align: 'center' });

                // Code + description
                doc.setFontSize(9.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d9);
                doc.text(d.code || '', m + 12, y + 2.5);
                doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d7); doc.setFontSize(8.5);
                var dDesc = doc.splitTextToSize(d.description || '', cw - 75);
                doc.text(dDesc, m + 30, y + 2.5);

                // HCC badge (right side)
                if (hasHcc) {
                    var hccLabel = d.hcc_code + '  |  RAF Weight: ' + (d.hcc_weight || 0);
                    badge(hccLabel, pw - m - 44, y + 2.5, C.sec, C.secLt);
                }

                // Detail line
                var dy = y + 7 + Math.max((dDesc.length - 1) * 3, 0);
                doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d5);
                var parts = [];
                if (d.type) parts.push('Type: ' + (d.type === 'primary' ? 'Primary Diagnosis' : d.type === 'secondary' ? 'Secondary Diagnosis' : d.type === 'comorbidity' ? 'Comorbidity (Co-existing Condition)' : d.type));
                if (d.confidence) parts.push('Confidence: ' + d.confidence + '%');
                if (d.hcc_category) parts.push('HCC Category: ' + d.hcc_category);
                if (d.hcc_weight) parts.push('Risk Adjustment Factor Weight: ' + d.hcc_weight);
                if (d.raf_impact) parts.push(d.raf_impact);
                if (parts.length > 0) { doc.text(parts.join('    |    '), m + 12, dy); dy += 3.5; }
                if (d.specificity && String(d.specificity).trim()) { doc.text('Specificity Note: ' + d.specificity, m + 12, dy); dy += 3.5; }
                y += cardH + 2;

                // ─── HCC IMPROVEMENT RECOMMENDATIONS ───
                if (hasAlts || hasSpecImprov) {
                    checkPage(16);
                    doc.setFillColor(255, 250, 240); doc.roundedRect(m + 6, y - 1, cw - 12, 5, 1, 1, 'F');
                    doc.setFillColor.apply(doc, C.warn); doc.rect(m + 6, y - 1, 1.5, 5, 'F');
                    doc.setFontSize(7.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.warn);
                    doc.text('RISK ADJUSTMENT IMPROVEMENT OPPORTUNITY FOR ' + (d.code || ''), m + 11, y + 2.5);
                    y += 7;

                    if (hasSpecImprov) {
                        doc.setFontSize(7.5); doc.setFont('helvetica', 'italic'); doc.setTextColor.apply(doc, C.d7);
                        var siLines = doc.splitTextToSize(d.specificity_improvement, cw - 20);
                        checkPage(siLines.length * 3 + 2);
                        doc.text(siLines, m + 10, y);
                        y += siLines.length * 3 + 2;
                    }

                    if (hasAlts) {
                        doc.setFontSize(7); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d5);
                        doc.text('Recommended Alternative Diagnosis Codes for Improved Risk Adjustment:', m + 10, y);
                        y += 4;

                        d.hcc_alternatives.forEach(function(alt) {
                            checkPage(14);
                            doc.setFillColor.apply(doc, C.secBg); doc.roundedRect(m + 10, y - 2, cw - 22, 10, 1, 1, 'F');
                            doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.sec);
                            doc.text((alt.code || '') + '  —  ' + (alt.description || ''), m + 13, y + 1.5);
                            doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d5);
                            var altInfo = [];
                            if (alt.hcc_code) altInfo.push('Maps to: ' + alt.hcc_code);
                            if (alt.hcc_category) altInfo.push('Category: ' + alt.hcc_category);
                            if (alt.hcc_weight) altInfo.push('Risk Adjustment Factor Weight: ' + alt.hcc_weight);
                            doc.text(altInfo.join('    |    '), m + 13, y + 5);
                            if (alt.rationale) {
                                doc.setFont('helvetica', 'italic'); doc.setTextColor.apply(doc, C.d7);
                                var ratLines = doc.splitTextToSize('Why: ' + alt.rationale, cw - 28);
                                doc.text(ratLines, m + 13, y + 8);
                            }
                            y += 12;
                        });
                    }
                    gap(1);
                }
            });

            // ─── HCC / RISK ADJUSTMENT SUMMARY BOX ───
            var hccCodes = report.icd10Codes.filter(function(d) { return (d.hcc_code && String(d.hcc_code).trim() !== '') || d.hcc_weight; });
            if (hccCodes.length > 0) {
                gap(2); checkPage(24);
                var totalRaf = hccCodes.reduce(function(s, d) { return s + (Number(d.hcc_weight) || 0); }, 0);
                // Summary card
                doc.setFillColor.apply(doc, C.secBg); doc.roundedRect(m, y, cw, 20, 2, 2, 'F');
                doc.setDrawColor.apply(doc, C.sec); doc.setLineWidth(0.4); doc.roundedRect(m, y, cw, 20, 2, 2, 'S');
                doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.sec);
                doc.text('HIERARCHICAL CONDITION CATEGORY (HCC) / RISK ADJUSTMENT SUMMARY', m + 5, y + 6);
                doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d7);
                doc.text('This summary shows how many of the patient\'s diagnosis codes contribute to their risk adjustment score.', m + 5, y + 10.5);
                doc.text(hccCodes.length + ' out of ' + report.icd10Codes.length + ' diagnosis codes map to Hierarchical Condition Categories.', m + 5, y + 14.5);
                doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.ok);
                doc.text('Combined Risk Adjustment Factor Weight: ' + totalRaf.toFixed(4), m + 5, y + 18.5);
                y += 24;
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  E/M LEVEL DETERMINATION
        // ═══════════════════════════════════════════════════════════
        if (report.emLevel) {
            section('Evaluation & Management (E/M) Level',
                'The E/M level indicates the complexity of the office or hospital visit. It is determined by the level of medical decision-making (MDM) complexity, which considers the number and severity of problems addressed, the amount of data reviewed, and the risk of complications.',
                C.pri);
            checkPage(14);
            card(m, cw, 14, C.priBg, C.pri);
            doc.setFontSize(14); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.pri);
            doc.text(report.emLevel.determined_level || 'Not Determined', m + 8, y + 8);
            doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, C.d7);
            doc.text('Medical Decision Making Complexity: ' + (report.emLevel.mdm_complexity || 'Not Specified'), m + 50, y + 5);
            if (report.emLevel.problems_addressed) doc.text('Problems Addressed: ' + report.emLevel.problems_addressed, m + 50, y + 9);
            if (report.emLevel.key_factors) doc.text('Key Factors: ' + report.emLevel.key_factors, m + 50, y + 13);
            y += 18;
        }

        // ═══════════════════════════════════════════════════════════
        //  AUDIT & VERIFICATION
        // ═══════════════════════════════════════════════════════════
        section('Audit & Verification Results',
            'This section shows the results of an automated coding audit. The audit grade reflects overall coding accuracy, the confidence score indicates how certain the system is in its analysis, and the audit risk level estimates the likelihood of problems if the claim were audited by a payer.',
            C.sec);

        // Three metric cards
        checkPage(20);
        var sw = (cw - 8) / 3;
        var statItems = [
            { lbl: 'AUDIT GRADE', sub: 'Overall coding quality', val: ag, col: agCol, bg: (ag === 'A' || ag === 'B') ? C.okBg : ag === 'C' ? C.warnBg : C.errBg },
            { lbl: 'CONFIDENCE', sub: 'System certainty level', val: (report.overallConfidence || 0) + '%', col: C.pri, bg: C.priBg },
            { lbl: 'AUDIT RISK', sub: 'Risk if claim is audited', val: (report.auditRisk || 'N/A'), col: riskCol(report.auditRisk), bg: riskBg(report.auditRisk) }
        ];
        statItems.forEach(function(s, i) {
            var sx = m + i * (sw + 4);
            card(sx, sw, 16, s.bg);
            doc.setFontSize(6.5); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, C.d5);
            doc.text(s.lbl, sx + sw / 2, y + 4.5, { align: 'center' });
            doc.setFontSize(14); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, s.col);
            doc.text(String(s.val), sx + sw / 2, y + 11.5, { align: 'center' });
            doc.setFontSize(5.5); doc.setFont('helvetica', 'italic'); doc.setTextColor.apply(doc, C.d4);
            doc.text(s.sub, sx + sw / 2, y + 15, { align: 'center' });
        });
        y += 20;

        if (report.auditNotes) { subsec('Audit Notes'); body(report.auditNotes, 6); }

        // Corrections
        if (report.corrections && report.corrections.length > 0) {
            subsec('Code Corrections Identified');
            small('The following codes appear to have been selected incorrectly. The original code and the recommended corrected code are shown with an explanation of why the change is needed.', 6);
            gap(1);
            report.corrections.forEach(function(c, i) {
                checkPage(12);
                doc.setFillColor.apply(doc, C.warnBg); doc.roundedRect(m + 4, y - 2, cw - 8, 8, 1.5, 1.5, 'F');
                txt((i + 1) + '.  Original Code: ' + (c.original || 'N/A') + '    \u2192    Corrected Code: ' + (c.corrected || 'N/A'), 8.5, true, C.warn, 7);
                if (c.reason) body('Reason for Correction: ' + c.reason, 10);
                gap(1);
            });
        }

        // Missing Codes
        if (report.missingCodes && report.missingCodes.length > 0) {
            subsec('Missing Codes That Should Be Added');
            small('These codes were not included in the claim but appear to be supported by the clinical documentation. Adding them may improve reimbursement accuracy and completeness.', 6);
            gap(1);
            report.missingCodes.forEach(function(mc, i) {
                checkPage(10);
                doc.setFillColor.apply(doc, C.errBg); doc.roundedRect(m + 4, y - 2, cw - 8, 6, 1.5, 1.5, 'F');
                txt((i + 1) + '.  ' + (mc.code || '') + ' (' + (mc.code_type === 'cpt' ? 'Procedure Code' : mc.code_type === 'icd10' ? 'Diagnosis Code' : mc.code_type || '') + ') \u2014 ' + (mc.description || ''), 8.5, false, C.err, 7);
                if (mc.reason) body('Reason: ' + mc.reason, 10);
            });
        }

        // Overcoded Flags
        if (report.overcodedFlags && report.overcodedFlags.length > 0) {
            subsec('Potential Overcoding Flags');
            small('The following codes may have been billed at a higher level than what the documentation supports. Overcoding can lead to audit penalties and refund demands.', 6);
            gap(1);
            report.overcodedFlags.forEach(function(oc, i) {
                checkPage(8);
                txt((i + 1) + '.  Code ' + (oc.code || 'N/A') + ' \u2014 ' + (oc.reason || 'Documentation may not support the level of service billed'), 8.5, false, C.warn, 7);
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  DENIAL PREVENTION ANALYSIS
        // ═══════════════════════════════════════════════════════════
        if (report.denialRisk) {
            section('Denial Prevention Analysis',
                'A claim denial means the insurance company has refused to pay for the services. This section analyzes the likelihood of denial and identifies specific risk factors. Addressing these issues before submitting the claim can significantly improve the chance of payment.',
                C.ok);

            var dr = report.denialRisk;
            var overallRisk = dr.overall_risk || dr.overallRisk || 'N/A';
            checkPage(14);
            // Overall risk banner
            card(m, cw, 10, riskBg(overallRisk));
            doc.setFontSize(11); doc.setFont('helvetica', 'bold'); doc.setTextColor.apply(doc, riskCol(overallRisk));
            doc.text('Overall Denial Risk Level:  ' + String(overallRisk).toUpperCase(), m + 5, y + 7);
            y += 14;

            // Risk Factors
            var factors = dr.risk_factors || dr.riskFactors || [];
            if (factors.length > 0) {
                subsec('Individual Risk Factors');
                small('Each factor below has been evaluated to determine whether it helps or hurts the claim\'s chances of being paid.', 6);
                gap(1);
                var posKw = ['well-documented', 'appropriate', 'supported', 'consistent', 'complete', 'meets criteria', 'verified', 'proper', 'accurate', 'correct', 'sufficient', 'documented'];
                var negKw = ['missing', 'incomplete', 'denied', 'high risk', 'lacking', 'insufficient', 'absent', 'not documented', 'unsupported', 'no documentation', 'critical'];
                factors.forEach(function(f) {
                    checkPage(8);
                    var fText = typeof f === 'string' ? f : (f.factor || f.description || JSON.stringify(f));
                    var fLower = fText.toLowerCase();
                    var isNeg = negKw.some(function(k) { return fLower.indexOf(k) >= 0; });
                    var isPos = posKw.some(function(k) { return fLower.indexOf(k) >= 0; });
                    var fCol = isNeg ? C.err : isPos ? C.ok : C.warn;
                    var fBg2 = isNeg ? C.errBg : isPos ? C.okBg : C.warnBg;
                    var icon = isNeg ? 'HIGH RISK' : isPos ? 'POSITIVE' : 'CAUTION';
                    var textLines = doc.splitTextToSize(fText, cw - 30);
                    doc.setFillColor.apply(doc, fBg2); doc.roundedRect(m + 4, y - 2.5, cw - 8, textLines.length * 3 + 4, 1.5, 1.5, 'F');
                    badge(icon, m + 6, y, fCol, fBg2);
                    doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor.apply(doc, fCol);
                    doc.text(textLines, m + 28, y);
                    y += textLines.length * 3 + 4;
                });
            }

            // High Risk Lines
            var hrLines = dr.high_risk_lines || dr.highRiskLines || [];
            if (hrLines.length > 0) {
                subsec('High-Risk Procedure Lines');
                hrLines.forEach(function(hl) {
                    var hlText = typeof hl === 'string' ? hl : (hl.code ? hl.code + ' \u2014 ' + (hl.reason || hl.description || '') : JSON.stringify(hl));
                    txt(hlText, 8, false, C.err, 7);
                });
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  BUNDLING / NCCI EDIT ISSUES
        // ═══════════════════════════════════════════════════════════
        if (report.bundlingIssues && report.bundlingIssues.length > 0) {
            section('Code Bundling & Edit Issues (NCCI)',
                'The National Correct Coding Initiative (NCCI) is a set of rules from Medicare that prevents certain procedure codes from being billed together on the same claim. When two codes are "bundled," only one can be paid unless a special modifier is used to indicate the services were truly separate and distinct.',
                C.warn);
            report.bundlingIssues.forEach(function(bi, i) {
                checkPage(14);
                var codes = bi.codes ? (Array.isArray(bi.codes) ? bi.codes.join(', ') : bi.codes) : 'Not Specified';
                doc.setFillColor.apply(doc, C.warnBg); doc.roundedRect(m + 2, y - 2, cw - 4, 6, 1.5, 1.5, 'F');
                txt((i + 1) + '.  Affected Codes: ' + codes, 8.5, true, C.warn, 5);
                if (bi.issue) body('Issue: ' + bi.issue, 9);
                if (bi.resolution) body('Recommended Resolution: ' + bi.resolution, 9);
                gap(1);
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  ABN REQUIREMENTS
        // ═══════════════════════════════════════════════════════════
        if (report.abnRequired && report.abnRequired.length > 0) {
            section('Advance Beneficiary Notice (ABN) Requirements',
                'An Advance Beneficiary Notice is a form given to a Medicare patient before a service is provided, informing them that Medicare may not pay for the service and that they may be personally responsible for the cost. An ABN must be obtained before the service is rendered.',
                C.warn);
            report.abnRequired.forEach(function(abn, i) {
                checkPage(12);

    const PipelineFlowDiagram = ({ pipelineStatus, currentStage, isRunning }) => {
        const stages = [
            { name: 'Patient Intake', icon: '👤' },
            { name: 'Eligibility Verification', icon: '🔍' },
            { name: 'Medical Coding', icon: '📝' },
            { name: 'Claims Submission', icon: '📤' },
            { name: 'Denial Management', icon: '❌' },
            { name: 'Payment Posting', icon: '💰' }

        const getStatus = (n) => pipelineStatus?.[n]?.status || 'pending';
        const getGradient = (s) => s === 'complete' ? 'linear-gradient(135deg, #6ee7b7, #38bdf8)' : s === 'running' ? 'linear-gradient(135deg, #c084fc, #818cf8, #38bdf8)' : s === 'error' ? 'linear-gradient(135deg, #fca5a5, #ef4444)' : 'rgba(255,255,255,0.05)';
        const getColor = (s) => s === 'complete' ? '#6ee7b7' : s === 'running' ? '#c084fc' : s === 'error' ? '#fca5a5' : 'rgba(255,255,255,0.3)';
        return (
            <div className="flex items-center justify-between gap-2">
                {stages.map((stage, idx) => {
                    const status = getStatus(stage.name);
                    const isCurrent = currentStage === stage.name;
                    return (
                        <React.Fragment key={stage.name}>
                            <div className="flex flex-col items-center flex-1">
                                <div style={{ width: '3.25rem', height: '3.25rem', borderRadius: '50%', background: getGradient(status), display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontWeight: 700, fontSize: '1.25rem', boxShadow: isCurrent && isRunning ? `0 0 0 3px white, 0 0 0 5px ${getColor(status)}, 0 0 20px ${getColor(status)}40` : status === 'complete' ? '0 2px 8px rgba(110,231,183,0.3)' : status === 'running' ? '0 2px 8px rgba(192,132,252,0.3)' : 'none', animation: isCurrent && isRunning ? 'glow 2s ease-in-out infinite' : 'none', transition: 'all .3s ease' }}>{stage.icon}</div>
                                <p style={{ fontSize: '.7rem', fontWeight: 600, color: status === 'pending' ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.7)', marginTop: '.5rem', textAlign: 'center', lineHeight: 1.2 }}>{stage.name}</p>
                            </div>
                            {idx < stages.length - 1 && <div style={{ flex: '0 0 auto', width: '2rem', height: '2px', background: status === 'complete' ? 'linear-gradient(90deg, #6ee7b7, #38bdf8)' : 'rgba(255,255,255,0.05)', borderRadius: '1px', transition: 'all .3s ease' }} />}
