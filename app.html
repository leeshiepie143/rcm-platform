                            <tr><th className="px-6 py-4 text-left font-semibold">Denial ID</th><th className="px-6 py-4 text-left font-semibold">Patient</th><th className="px-6 py-4 text-left font-semibold">Code</th><th className="px-6 py-4 text-left font-semibold">Reason</th><th className="px-6 py-4 text-right font-semibold">Amount</th><th className="px-6 py-4 text-left font-semibold">Deadline</th><th className="px-6 py-4 text-left font-semibold">Status</th><th className="px-6 py-4 text-left font-semibold">Action</th></tr>
                        </thead>
                        <tbody className="divide-y">
                            {denials.map(d => {
                                const days = Math.ceil((new Date(d.deadline) - new Date()) / 86400000);
                                const urgent = days <= 7 && days > 0;
                                return (
                                    <tr key={d.id} style={{ background: urgent ? 'rgba(253,230,138,0.1)' : 'transparent' }}>
                                        <td className="px-6 py-4 font-mono text-blue-600">{d.id}</td>
                                        <td className="px-6 py-4">{d.patient}</td>
                                        <td className="px-6 py-4">{d.code}</td>
                                        <td className="px-6 py-4 text-sm">{d.reason}</td>
                                        <td className="px-6 py-4 text-right">${d.amount.toLocaleString()}</td>
                                        <td className="px-6 py-4"><span style={{ color: urgent ? '#fde68a' : 'rgba(255,255,255,0.45)', fontWeight: 500 }}>{d.deadline} ({days > 0 ? `${days}d left` : 'overdue'})</span></td>
                                        <td className="px-6 py-4"><StatusBadge status={d.status} /></td>
                                        <td className="px-6 py-4 text-sm">{d.status === 'In Review' ? <button onClick={e => { e.stopPropagation(); setSelected(d); setShowAppeal(true); }} className="text-blue-600 font-medium" style={{ background: 'none', border: 'none' }}>Appeal</button> : <span className="text-gray-500">—</span>}</td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
                {trends && (
                    <div className="card-premium" style={{ padding: '1.75rem' }}>
                        <h3 style={{ fontSize: '1.1rem', fontWeight: 700, color: '#f1f5f9', marginBottom: '1rem' }}>Denial Trends by Category</h3>
                        <div className="space-y-4">
                            {trends.map(m => (
                                <div key={m.month}>
                                    <div className="flex justify-between items-center mb-2"><span className="text-sm font-medium text-gray-700">{m.month}</span><span className="text-sm text-gray-500">{m.Eligibility + m['Medical Necessity'] + m.Coding + m.Other} total</span></div>
                                    <div className="flex gap-1">
                                        <div style={{ width: `${(m.Eligibility/60)*100}%`, height: '1.5rem', borderRadius: '.25rem', background: '#ef4444' }} title={`Eligibility: ${m.Eligibility}`} />
                                        <div style={{ width: `${(m['Medical Necessity']/60)*100}%`, height: '1.5rem', borderRadius: '.25rem', background: '#fdba74' }} title={`Medical Necessity: ${m['Medical Necessity']}`} />
                                        <div style={{ width: `${(m.Coding/60)*100}%`, height: '1.5rem', borderRadius: '.25rem', background: '#fde68a' }} title={`Coding: ${m.Coding}`} />
                                        <div style={{ width: `${(m.Other/60)*100}%`, height: '1.5rem', borderRadius: '.25rem', background: 'rgba(255,255,255,0.45)' }} title={`Other: ${m.Other}`} />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const ClaimsQueuePage = () => {
        const [queue, setQueue] = React.useState(() => ClaimsQueueManager.getQueue());
        const [selectedBucket, setSelectedBucket] = React.useState('queue');
        const [filterProvider, setFilterProvider] = React.useState('');
        const [filterPractice, setFilterPractice] = React.useState('');
        const [filterPatient, setFilterPatient] = React.useState('');
        const [selectedClaims, setSelectedClaims] = React.useState([]);
        const [bulkStatus, setBulkStatus] = React.useState('');
        const [expandedClaim, setExpandedClaim] = React.useState(null);

        const buckets = [
            { id: 'queue', label: 'Work Queue', icon: '📦', color: '#c084fc' },
            { id: 'flagged', label: 'Flagged Items', icon: '🚩', color: '#fde68a' },
            { id: 'completed', label: 'Completed', icon: '✅', color: '#6ee7b7' },
            { id: 'all', label: 'All Claims', icon: '📋', color: '#38bdf8' }
        ];

        const getFilteredClaims = () => {
            let filtered = queue;
            if (selectedBucket === 'queue') {
                filtered = filtered.filter(c => c.status === 'queue');
            } else if (selectedBucket === 'flagged') {
                filtered = filtered.filter(c => (c.flags && c.flags.length > 0) || (c.flagStatus && c.flagStatus.length > 0));
            } else if (selectedBucket === 'completed') {
                filtered = filtered.filter(c => ['entered', 'submitted'].includes(c.status));
            }
            if (filterProvider) filtered = filtered.filter(c => (c.providerName || '').toLowerCase().includes(filterProvider.toLowerCase()));
            if (filterPractice) filtered = filtered.filter(c => (c.practiceName || '').toLowerCase().includes(filterPractice.toLowerCase()));
            if (filterPatient) filtered = filtered.filter(c => ((c.patientFirstName || '') + ' ' + (c.patientLastName || '')).toLowerCase().includes(filterPatient.toLowerCase()));
            return filtered;
        };

        const updateClaimStatus = (claimId, status) => {
            ClaimsQueueManager.updateClaim(claimId, { status });
            setQueue(ClaimsQueueManager.getQueue());
        };

        const deleteClaim = (claimId) => {
            ClaimsQueueManager.removeFromQueue(claimId);
            setQueue(ClaimsQueueManager.getQueue());
            setSelectedClaims(prev => prev.filter(id => id !== claimId));
        };

        const updateMultipleStatus = () => {
            if (!bulkStatus || selectedClaims.length === 0) return;
            selectedClaims.forEach(id => updateClaimStatus(id, bulkStatus));
            setSelectedClaims([]);
            setBulkStatus('');
        };

        const filteredClaims = getFilteredClaims();

        return (
            <div className="space-y-6">
                <div className="flex items-center justify-between">
                    <div><h2 style={{ fontSize: '1.875rem', fontWeight: 800, color: '#f1f5f9', letterSpacing: '-0.025em' }}>Claims Queue</h2><p style={{ color: 'rgba(255,255,255,0.45)', marginTop: '.25rem', fontSize: '.925rem' }}>CMS 1500-style claim tracking — manage, review, and export for billing platform upload</p></div>
                    <div style={{ padding: '.5rem 1rem', borderRadius: 'var(--radius-md)', background: 'rgba(192,132,252,0.06)', border: '1px solid rgba(192,132,252,0.15)' }}>
                        <span style={{ fontSize: '.8rem', fontWeight: 600, color: '#c084fc' }}>{queue.length} total lines</span>
                    </div>
                </div>

                <div className="flex flex-wrap gap-3 mb-4">
                    {buckets.map(b => {
                        let count = 0;
                        if (b.id === 'queue') count = queue.filter(c => c.status === 'queue').length;
                        else if (b.id === 'flagged') count = queue.filter(c => (c.flags && c.flags.length > 0) || (c.flagStatus && c.flagStatus.length > 0)).length;
                        else if (b.id === 'completed') count = queue.filter(c => ['entered', 'submitted'].includes(c.status)).length;
                        else count = queue.length;
                        return (
                            <button key={b.id} onClick={() => setSelectedBucket(b.id)} style={{ padding: '.625rem 1rem', borderRadius: 'var(--radius-md)', border: selectedBucket === b.id ? '2px solid ' + b.color : '1.5px solid rgba(255,255,255,0.1)', background: selectedBucket === b.id ? 'rgba(255,255,255,0.05)' : 'transparent', color: selectedBucket === b.id ? b.color : 'rgba(255,255,255,0.6)', fontSize: '.875rem', fontWeight: 600, cursor: 'pointer', transition: 'all .2s' }}>
                                {b.icon} {b.label} ({count})
                            </button>
                        );
                    })}
                </div>

                <div className="grid grid-cols-1 md-grid-cols-3 gap-3 mb-4">
                    <input className="input text-sm" placeholder="Filter by provider..." value={filterProvider} onChange={e => setFilterProvider(e.target.value)} />
                    <input className="input text-sm" placeholder="Filter by practice..." value={filterPractice} onChange={e => setFilterPractice(e.target.value)} />
                    <input className="input text-sm" placeholder="Filter by patient name..." value={filterPatient} onChange={e => setFilterPatient(e.target.value)} />
                </div>

                {selectedClaims.length > 0 && (
                    <div className="card-premium p-3 flex items-center gap-3">
                        <span className="text-sm font-semibold" style={{ color: '#f1f5f9' }}>{selectedClaims.length} selected</span>
                        <select className="input text-sm" value={bulkStatus} onChange={e => setBulkStatus(e.target.value)}>
                            <option value="">Set status...</option>
                            <option value="queue">Work Queue</option>
                            <option value="entered">Entered in PM</option>
                            <option value="submitted">Submitted</option>
                            <option value="reviewed">Reviewed</option>
                        </select>
                        <button onClick={updateMultipleStatus} className="btn btn-primary text-sm" disabled={!bulkStatus}>Apply</button>
                        <button onClick={() => setSelectedClaims([])} className="btn btn-secondary text-sm">Clear</button>
                    </div>
                )}

                <div className="card-premium overflow-x-auto">
                    {filteredClaims.length > 0 ? (
                        <table className="table-premium" style={{ minWidth: '1200px' }}>
                            <thead>
                                <tr>
                                    <th style={{ width: '30px' }}><input type="checkbox" onChange={e => setSelectedClaims(e.target.checked ? filteredClaims.map(c => c.id) : [])} /></th>
                                    <th>Claim ID</th>
                                    <th>DOS</th>
                                    <th>Patient</th>
                                    <th>Practice</th>
                                    <th>Provider</th>
                                    <th>Facility</th>
                                    <th>CPT</th>
                                    <th>Dx1</th>
                                    <th>POS</th>
                                    <th>Payer</th>
                                    <th>Charge</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredClaims.map(claim => (
                                    <React.Fragment key={claim.id}>
                                        <tr onClick={() => setExpandedClaim(expandedClaim === claim.id ? null : claim.id)} style={{ cursor: 'pointer' }}>
                                            <td onClick={e => e.stopPropagation()}><input type="checkbox" checked={selectedClaims.includes(claim.id)} onChange={e => setSelectedClaims(e.target.checked ? [...selectedClaims, claim.id] : selectedClaims.filter(id => id !== claim.id))} /></td>
                                            <td><span style={{ fontFamily: 'monospace', fontSize: '.75rem', color: '#c084fc' }}>{claim.claimId || claim.id}</span></td>
                                            <td style={{ fontSize: '.8rem', color: '#f1f5f9', whiteSpace: 'nowrap' }}>{claim.dateOfService || '-'}</td>
                                            <td style={{ fontSize: '.8rem', color: '#f1f5f9' }}>{[claim.patientLastName, claim.patientFirstName].filter(Boolean).join(', ') || '-'}</td>
                                            <td style={{ fontSize: '.8rem' }}>{claim.practiceName || '-'}</td>
                                            <td style={{ fontSize: '.8rem' }}>{claim.providerName || '-'}</td>
                                            <td style={{ fontSize: '.8rem' }}>{claim.facilityName || '-'}</td>
                                            <td><span style={{ fontFamily: 'monospace', fontSize: '.8rem', color: '#38bdf8', fontWeight: 600 }}>{claim.procedureCode || '-'}</span></td>
                                            <td style={{ fontFamily: 'monospace', fontSize: '.75rem', color: 'rgba(255,255,255,0.6)' }}>{claim.diagnosisCode1 || '-'}</td>
                                            <td style={{ fontSize: '.8rem', color: 'rgba(255,255,255,0.6)' }}>{claim.locationPos || '-'}</td>
                                            <td style={{ fontSize: '.8rem' }}>{claim.insurancePayerName || '-'}</td>
                                            <td style={{ fontSize: '.8rem', fontWeight: 600, color: '#6ee7b7' }}>{claim.chargeAmount ? '$' + Number(claim.chargeAmount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-'}</td>
                                            <td onClick={e => e.stopPropagation()}><StatusBadge status={claim.status === 'queue' ? 'pending' : claim.status === 'entered' ? 'Accepted' : claim.status === 'submitted' ? 'Submitted' : 'In Review'} /></td>
                                            <td onClick={e => e.stopPropagation()}>
                                                <div className="flex gap-1">
                                                    <select className="input text-xs" value={claim.status} onChange={e => updateClaimStatus(claim.id, e.target.value)} style={{ padding: '.25rem .375rem', minWidth: '80px' }}>
                                                        <option value="queue">Queue</option>
                                                        <option value="entered">Entered</option>
                                                        <option value="submitted">Submitted</option>
                                                        <option value="reviewed">Reviewed</option>
                                                    </select>
                                                    <button onClick={() => { if (confirm('Delete this claim line?')) deleteClaim(claim.id); }} style={{ padding: '.25rem .5rem', fontSize: '.7rem', background: 'rgba(248,113,113,0.1)', color: '#fca5a5', border: '1px solid rgba(252,165,165,0.2)', borderRadius: 'var(--radius-sm)', cursor: 'pointer' }}>X</button>
                                                </div>
                                            </td>
                                        </tr>
                                        {expandedClaim === claim.id && (
                                            <tr>
                                                <td colSpan="14" style={{ padding: '1rem', background: 'rgba(192,132,252,0.03)', borderTop: 'none' }}>
                                                    <div className="grid grid-cols-1 md-grid-cols-3 gap-4" style={{ fontSize: '.8rem' }}>
                                                        <div>
                                                            <p style={{ fontWeight: 700, color: '#c084fc', marginBottom: '.5rem' }}>Patient Details</p>
                                                            <p style={{ color: '#f1f5f9' }}>{claim.patientFirstName} {claim.patientLastName}</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>DOB: {claim.dateOfBirth || '-'} | Sex: {claim.sex || '-'}</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>{[claim.patientStreet1, claim.patientStreet2, claim.patientCity, claim.patientState, claim.patientZip].filter(Boolean).join(', ') || 'No address'}</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>Home: {claim.homePhone || '-'} | Mobile: {claim.mobilePhone || '-'}</p>
                                                        </div>
                                                        <div>
                                                            <p style={{ fontWeight: 700, color: '#c084fc', marginBottom: '.5rem' }}>Insurance</p>
                                                            <p style={{ color: '#f1f5f9' }}>{claim.insurancePayerName || '-'}</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>Plan: {claim.insurancePlanName || '-'} ({claim.insurancePlanType || '-'})</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>Policy ID: {claim.insurancePolicyIdentifier || '-'} | Group: {claim.insuranceGroupNumber || '-'}</p>
                                                            <p style={{ fontWeight: 700, color: '#c084fc', marginBottom: '.25rem', marginTop: '.5rem' }}>Guarantor</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>Relation: {claim.guarantorRelation || '-'} | Ph: {claim.guarantorPrimaryPhone || '-'}</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>{[claim.guarantorStreet, claim.guarantorCity, claim.guarantorState, claim.guarantorZip].filter(Boolean).join(', ') || '-'}</p>
                                                        </div>
                                                        <div>
                                                            <p style={{ fontWeight: 700, color: '#c084fc', marginBottom: '.5rem' }}>Procedure & Diagnosis</p>
                                                            <p style={{ color: '#f1f5f9' }}>CPT: {claim.procedureCode || '-'} | Units: {claim.units || 1} | Mod: {claim.modifiers || '-'}</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>POS: {claim.locationPos || '-'} | Charge: {claim.chargeAmount ? '$' + claim.chargeAmount : '-'}</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)', marginTop: '.25rem' }}>Dx: {[claim.diagnosisCode1, claim.diagnosisCode2, claim.diagnosisCode3, claim.diagnosisCode4, claim.diagnosisCode5, claim.diagnosisCode6].filter(Boolean).join(', ') || '-'}</p>
                                                            <p style={{ fontWeight: 700, color: '#c084fc', marginBottom: '.25rem', marginTop: '.5rem' }}>Practice / Facility</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>Practice: {claim.practiceName || '-'} (NPI: {claim.practiceNpi || '-'})</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>Facility: {claim.facilityName || '-'} (NPI: {claim.facilityNpi || '-'})</p>
                                                            <p style={{ color: 'rgba(255,255,255,0.5)' }}>Rendering NPI: {claim.renderNpi || '-'}</p>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                        )}
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    ) : (
                        <div style={{ padding: '3rem 1.5rem', textAlign: 'center' }}>
                            <p style={{ color: 'rgba(255,255,255,0.45)' }}>No claims in this bucket</p>
                        </div>
                    )}
                </div>

                {filteredClaims.length > 0 && (
                    <div className="flex gap-3 flex-wrap">
                        <button onClick={() => {
                            const csv = ClaimsQueueManager.exportQueue('csv');
                            const blob = new Blob([csv], { type: 'text/csv' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a'); a.href = url; a.download = 'claims_queue_CMS1500_' + new Date().toISOString().slice(0, 10) + '.csv'; a.click(); URL.revokeObjectURL(url);
                        }} className="btn btn-secondary text-sm">Export CSV (CMS 1500 Format)</button>
                        <button onClick={() => {
                            const json = ClaimsQueueManager.exportQueue('json');
                            const blob = new Blob([json], { type: 'application/json' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a'); a.href = url; a.download = 'claims_queue_' + new Date().toISOString().slice(0, 10) + '.json'; a.click(); URL.revokeObjectURL(url);
                        }} className="btn btn-secondary text-sm">Export JSON</button>
                        <button onClick={() => {
                            if (confirm('Clear all claims in the queue? This cannot be undone.')) {
                                ClaimsQueueManager.saveQueue([]);
                                setQueue([]);
                                setSelectedClaims([]);
                            }
                        }} style={{ padding: '.5rem 1rem', fontSize: '.875rem', fontWeight: 600, background: 'rgba(248,113,113,0.1)', color: '#fca5a5', border: '1px solid rgba(252,165,165,0.2)', borderRadius: 'var(--radius-md)', cursor: 'pointer' }}>Clear Queue</button>
                    </div>
                )}
            </div>
        );
    };

    const AnalyticsPage = () => {
        const [payer, setPayer] = React.useState(null);
        const [ccr, setCcr] = React.useState(null);
        const [cpt, setCpt] = React.useState(null);
        const [denial, setDenial] = React.useState(null);
        const [ar, setAr] = React.useState(null);
        const [loading, setLoading] = React.useState(true);
        const [analyticsTab, setAnalyticsTab] = React.useState('financial');
        React.useEffect(() => {
            const load = async () => {
                const a = await APIService.getAnalytics();
                setPayer(a.revenueByPayer);
                setCcr(a.cleanClaimRate);
                setCpt(a.avgReimbursementByCpt);
                setDenial(a.denialRateByCategory);
                setAr(a.daysInAr);
                setLoading(false);
            };
            load();
        }, []);
        const savedClaims = (() => { try { return Array.isArray(window.RCM_SAVED_CLAIMS) ? window.RCM_SAVED_CLAIMS : []; } catch(e) { return []; } })();
        const complianceStats = React.useMemo(() => {
            if (savedClaims.length === 0) return null;
            const allLines = savedClaims.flatMap(c => c.claimLines || []);
            const totalLines = allLines.length;
            const modifierUsage = {};
            allLines.forEach(l => (l.modifiers || []).forEach(m => { modifierUsage[m] = (modifierUsage[m] || 0) + 1; }));
            const modTop = Object.entries(modifierUsage).sort((a, b) => b[1] - a[1]).slice(0, 10).map(([mod, count]) => ({ mod, count, pct: ((count / totalLines) * 100).toFixed(1) }));
            const totalRvus = savedClaims.reduce((s, c) => s + (parseFloat(c.totalRvu) || 0), 0);
            const avgRvu = totalRvus / savedClaims.length;
            const grades = { A: 0, B: 0, C: 0, D: 0, F: 0 };
            savedClaims.forEach(c => { const g = c.auditGrade || 'N/A'; if (grades[g] !== undefined) grades[g]++; });
            const cciIssues = savedClaims.filter(c => !c.cciClear).length;
            const payerMix = {};
            savedClaims.forEach(c => { const p = c.payer || 'Unknown'; payerMix[p] = (payerMix[p] || 0) + 1; });
            const payerTop = Object.entries(payerMix).sort((a, b) => b[1] - a[1]).map(([p, count]) => ({ payer: p, count, pct: ((count / savedClaims.length) * 100).toFixed(1) }));
            return { totalClaims: savedClaims.length, totalLines, modTop, avgRvu: avgRvu.toFixed(2), totalRvus: totalRvus.toFixed(2), grades, cciIssues, cciRate: ((cciIssues / savedClaims.length) * 100).toFixed(1), payerTop };
        }, [savedClaims.length]);
        if (loading) return <div className="flex items-center justify-center h-80"><div className="spinner" /></div>;
        return (
            <div className="space-y-6">
                <div><h2 style={{ fontSize: '1.875rem', fontWeight: 800, color: '#f1f5f9', letterSpacing: '-0.025em' }}>Analytics & Compliance</h2><p style={{ color: 'rgba(255,255,255,0.45)', marginTop: '.25rem', fontSize: '.925rem' }}>Financial performance metrics and coding compliance analytics</p></div>
                <div className="flex gap-2 mb-4">
                    <button onClick={() => setAnalyticsTab('financial')} style={{ padding: '.5rem 1.25rem', fontSize: '.8125rem', fontWeight: 600, borderRadius: 'var(--radius-md)', background: analyticsTab === 'financial' ? 'var(--gradient-accent)' : 'rgba(255,255,255,0.05)', color: analyticsTab === 'financial' ? 'white' : 'rgba(255,255,255,0.6)', border: 'none', cursor: 'pointer', transition: 'all .2s ease', boxShadow: analyticsTab === 'financial' ? '0 2px 8px rgba(99,102,241,0.25)' : 'none' }}>Financial Analytics</button>
                    <button onClick={() => setAnalyticsTab('compliance')} style={{ padding: '.5rem 1.25rem', fontSize: '.8125rem', fontWeight: 600, borderRadius: 'var(--radius-md)', background: analyticsTab === 'compliance' ? 'var(--gradient-accent)' : 'rgba(255,255,255,0.05)', color: analyticsTab === 'compliance' ? 'white' : 'rgba(255,255,255,0.6)', border: 'none', cursor: 'pointer', transition: 'all .2s ease', boxShadow: analyticsTab === 'compliance' ? '0 2px 8px rgba(99,102,241,0.25)' : 'none' }}>Coding Compliance</button>
                </div>
                {analyticsTab === 'financial' && (
                    <div className="space-y-6">
                {payer && (
                    <div className="card-premium" style={{ padding: '1.75rem' }}>
                        <h3 style={{ fontSize: '1.1rem', fontWeight: 700, color: '#f1f5f9', marginBottom: '1rem' }}>Revenue by Payer</h3>
                        <div className="space-y-4">
                            {payer.map(p => {
                                const total = payer.reduce((s, x) => s + x.value, 0);
                                const pct = ((p.value / total) * 100).toFixed(1);
                                return (
                                    <div key={p.payer}>
                                        <div className="flex justify-between items-center mb-2"><span className="text-sm font-medium text-gray-700">{p.payer}</span><span className="text-sm font-bold text-gray-900">${(p.value / 1000).toFixed(0)}K ({pct}%)</span></div>
                                        <div style={{ width: '100%', height: '1.5rem', background: 'rgba(255,255,255,0.05)', borderRadius: 'var(--radius-sm)', overflow: 'hidden' }}><div style={{ width: `${pct}%`, height: '100%', background: p.fill, transition: 'all .3s' }} /></div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}

        const code = String(cptCode).trim();

        const localityKey = resolveMpfsLocality(stateCode);
        if (localityKey && typeof MPFS_KNOWLEDGE_BASE !== 'undefined') {

            if (mpfs && mpfs.codes) {

                if (entry) {

                    const isFacility = posCode && ['21','22','23','24','31','34','41','42','51','52','53','56','61'].includes(String(posCode));
                    let payment = 0;
                    let rateType = 'non-facility';
                    if (isFacility && entry.f != null) {
                        payment = entry.f;
                        rateType = 'facility';
                    } else if (entry.p != null) {
                        payment = entry.p;
                        rateType = entry.f != null ? 'non-facility' : 'standard';
                    } else if (entry.f != null) {
                        payment = entry.f;
                        rateType = 'facility';
                    }
                    // Supplement with RVU data from static table if available
                    const staticFee = MEDICARE_FEE_SCHEDULE[code];
                    const result = {
                        desc: staticFee ? staticFee.desc : '',
                        payment: Math.round(payment * 100) / 100,
                        locality: mpfs.meta.name || stateCode,
                        localityKey,
                        conversionFactor: MEDICARE_CONVERSION_FACTOR,
                        source: 'MPFS',

                        facilityPar: entry.f != null ? entry.f : null,
                        nonFacilityPar: entry.p != null ? entry.p : null,
                        globalPeriod: staticFee ? staticFee.globalPeriod : ''

        const chunkDocument = (text, maxCharsPerChunk) => {
            if (text.length <= maxCharsPerChunk) return [text];
            const chunks = [];
            const sections = text.split(/\n{3,}|\f|\r\n\r\n\r\n|(?=(?:OPERATIVE REPORT|HISTORY AND PHYSICAL|PROGRESS NOTE|DISCHARGE SUMMARY|CONSULTATION|PROCEDURE NOTE|PATIENT:|DATE OF SERVICE|CHIEF COMPLAINT|PREOPERATIVE DIAGNOSIS|POSTOPERATIVE DIAGNOSIS))/i);
            let current = '';
            for (const section of sections) {
                if ((current + '\n\n' + section).length > maxCharsPerChunk && current.length > 0) {
                    chunks.push(current.trim());
                    current = section;
                } else {
                    current = current ? current + '\n\n' + section : section;
                }
            }
            if (current.trim()) chunks.push(current.trim());
            if (chunks.length === 0) {
                const totalChunks = Math.ceil(text.length / maxCharsPerChunk);
                for (let i = 0; i < totalChunks; i++) {
                    chunks.push(text.substring(i * maxCharsPerChunk, (i + 1) * maxCharsPerChunk));
                }
            }
            return chunks;
        };

        const mergeResults = (resultsArray) => {
            const merged = { cpt_codes: [], icd10_codes: [], hcpcs_codes: [], modifiers_applied: [], ncci_cci_analysis: [], mue_check: [], medical_necessity: [], pos_validation: [], iom_transmittal_references: [], documentation_findings: { completeness_score: 0, strengths: [], deficiencies: [], recommendations: [] }, em_level: null, payer_alerts: [], procedure_summary: '', specialty_detected: '' };
            const seenCpt = new Set();
            const seenIcd = new Set();
            const seenHcpcs = new Set();
            const summaries = [];
            for (const r of resultsArray) {
                if (r.specialty_detected && !merged.specialty_detected) merged.specialty_detected = r.specialty_detected;
                if (r.procedure_summary) summaries.push(r.procedure_summary);
                for (const c of (r.cpt_codes || [])) { if (!seenCpt.has(c.code + (c.modifiers || []).join(','))) { seenCpt.add(c.code + (c.modifiers || []).join(',')); merged.cpt_codes.push(c); } }
                for (const c of (r.icd10_codes || [])) { if (!seenIcd.has(c.code)) { seenIcd.add(c.code); merged.icd10_codes.push(c); } }
                for (const c of (r.hcpcs_codes || [])) { if (!seenHcpcs.has(c.code)) { seenHcpcs.add(c.code); merged.hcpcs_codes.push(c); } }
                merged.modifiers_applied.push(...(r.modifiers_applied || []));
                merged.ncci_cci_analysis.push(...(r.ncci_cci_analysis || []));
                merged.mue_check.push(...(r.mue_check || []));
                merged.medical_necessity.push(...(r.medical_necessity || []));
                merged.pos_validation.push(...(r.pos_validation || []));
                merged.iom_transmittal_references.push(...(r.iom_transmittal_references || []));
                merged.payer_alerts.push(...(r.payer_alerts || []));
                if (r.em_level && !merged.em_level) merged.em_level = r.em_level;
                if (r.documentation_findings) {
                    merged.documentation_findings.strengths.push(...(r.documentation_findings.strengths || []));
                    merged.documentation_findings.deficiencies.push(...(r.documentation_findings.deficiencies || []));
                    merged.documentation_findings.recommendations.push(...(r.documentation_findings.recommendations || []));
                    merged.documentation_findings.completeness_score = Math.max(merged.documentation_findings.completeness_score, r.documentation_findings.completeness_score || 0);
                }
            }
            merged.procedure_summary = summaries.join(' | ');
            merged.payer_alerts = [...new Set(merged.payer_alerts)];
            merged.documentation_findings.strengths = [...new Set(merged.documentation_findings.strengths)];
            merged.documentation_findings.deficiencies = [...new Set(merged.documentation_findings.deficiencies)];
            merged.documentation_findings.recommendations = [...new Set(merged.documentation_findings.recommendations)];
            return merged;
        };

rs (Pub 100-04 Claims Processing, Pub 100-02 Benefit Policy) and any relevant CMS Transmittals/Change Requests that impose billing limitations, frequency limits, or POS restrictions on the identified procedures. Include transmittal numbers (e.g., CR XXXXX, Transmittal XXXX) when applicable.\n10. GLOBAL PERIOD CHECK: For surgical procedures, identify the global surgery period (0-day, 10-day, 90-day) and note any implications for billing E/M services during that period.\n\nRespond with ONLY this JSON structure (no other text):\n{"specialty_detected":"string","procedure_summary":"string","cpt_codes":[{"code":"XXXXX","description":"string","modifiers":[],"modifier_reasons":[],"units":1,"rvu_work":0.00,"estimated_reimbursement":"$0.00","is_addon":false,"primary_code":"","global_period":"XXX","global_period_days":0,"linked_icd10":["XXX.XXX"],"cci_checked":true,"denial_risk":"low|medium|high","denial_reason":""}],"icd10_codes":[{"code":"XXX.XXX","description":"string","type":"primary|secondary|comorbidity","specificity_note":"string","hcc_code":"","hcc_category":"","hcc_weight":0.0,"raf_impact":"","hcc_alternatives":[{"code":"XXX.XXX","description":"string","hcc_code":"","hcc_category":"","hcc_weight":0.0,"rationale":"string"}],"specificity_improvement":"string"}],"hcpcs_codes":[{"code":"XXXXX","description":"string","units":1,"reason":"string","linked_icd10":["XXX.XXX"]}],"modifiers_applied":[{"modifier":"XX","description":"string","applied_to":"XXXXX","rationale":"string"}],"ncci_cci_analysis":[{"code_pair":"XXXXX / XXXXX","conflict":false,"resolution":"string","modifier_allowed":true,"column":"1|2","effective_date":"string"}],"mue_check":[{"code":"XXXXX","units_billed":1,"mue_limit":1,"status":"PASS","rationale":"string"}],"medical_necessity":[{"cpt":"XXXXX","linked_icd10":"XXX.XXX","necessity_met":true,"lcd_ncd_reference":"string","explanation":"string"}],"pos_validation":[{"code":"XXXXX","pos_code":"XX","pos_name":"string","allowed":true,"payment_rate":"facility|non-f         const extractPdfText = async (file) => {
            if (!window.pdfjsLib) throw new Error('PDF.js library not loaded. Please refresh the page and try again.');
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await window.pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
            const totalPages = pdf.numPages;
            const textPages = [];
            const imagePages = [];
            for (let i = 1; i <= totalPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const lines = [];
                let lastY = null;
                content.items.forEach(item => {
                    if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) lines.push('\n');
                    lines.push(item.str);
                    lastY = item.transform[5];
                });
                const pageText = lines.join(' ').replace(/ \n /g, '\n').replace(/  +/g, ' ').trim();
                if (pageText.length > 0) textPages.push(pageText);
                const scale = 2.0;
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                const base64 = dataUrl.split(',')[1];
                imagePages.push(base64);

                    'ICD-10: ' + (aiResult.icd10_codes || []).map(c => c.code + ' - ' + c.description + ' (' + c.type + ')').join('\n') + '\n' +
                    'HCPCS: ' + (aiResult.hcpcs_codes || []).map(c => c.code + ' - ' + c.description).join('\n') + '\n\n' +
                    'DOCUMENT TYPE: ' + docType + '\nSPECIALTY: ' + specialty + '\nPAYER: ' + payer + verificationPayerContext +
                    (posInfo ? '\nPOS: ' + posInfo.code + ' - ' + posInfo.name : '') +
                    (coverageData && coverageData.total_results > 0 ? '\n\n=== REAL-TIME CMS COVERAGE DATA (from Medicare Coverage Database API) ===\n' +
                        (coverageData.lcds.length > 0 ? 'ACTIVE LCDs:\n' + coverageData.lcds.map(l => '- ' + l.document_id + ': ' + l.title + ' (' + l.contractor + ') [Eff: ' + l.effective_date + '] ' + l.url).join('\n') + '\n' : '') +
                        (coverageData.articles.length > 0 ? 'BILLING ARTICLES:\n' + coverageData.articles.map(a => '- ' + a.document_id + ': ' + a.title + ' (' + a.contractor + ') [Eff: ' + a.effective_date + '] ' + a.url).join('\n') + '\n' : '') +
                        (coverageData.ncds.length > 0 ? 'NCDs:\n' + coverageData.ncds.map(n => '- ' + n.document_id + ': ' + n.title + ' [Eff: ' + n.effective_date + '] ' + n.url).join('\n') + '\n' : '') +
                        'IMPORTANT: Cross-reference each coded procedure against the ACTIVE LCDs listed above. Check if the LCD requires specific ICD-10 codes, documentation elements, or frequency limits. Flag in payer_alerts if a procedure may not meet LCD criteria.\n=== END COVERAGE DATA ===' : '') +
                    '\n\nVERIFICATION INSTRUCTIONS:\n' +
                    '1. For EACH CPT code: Verify it exactly matches the documented procedure. Check: Is this the right code family? Is it the right specificity (e.g., prosthetic replacement vs excision)? Are the modifiers correct? Is the code active for the current year?\n' +
                    '2. For EACH ICD-10 code: Verify laterality, specificity (7th character), and that it matches the documented diagnosis. Check for higher specificity options.\n' +
                    '3. Check for MISSING codes: Are there documented procedures not captured? Missing implant HCPCS?\n' +
                    '4. Check for OVERCODING: Are any codes not supported by the documentation?\n' +
                    '5. CCI/NCCI BUNDLING (MANDATORY): Check EVERY possible pair of CPT codes for NCCI Column 1/Column 2 edit conflicts. For each pair, determine: (a) Does a CCI edit exist? (b) Which is Column 1 (comprehensive) and which is Column 2 (component)? (c) Is a modifier indicator of 1 (modifier allowed) or 0 (not allowed)? (d) If conflict exists and modifier allowed, verify correct modifier (59/XE/XS/XP/XU) is applied. Report ALL bundling conflicts in bundling_issues.\n' +
                    '6. ICD-10 LINKAGE VALIDATION: Verify that EACH CPT code has appropriate linked_icd10 diagnosis pointers. The primary diagnosis must support medical necessity for that specific procedure. Incorrect or missing linkage will cause claim denial.\n' +
                    '7. AUDIT RISK: Flag any code combinations that are high-risk for audit (e.g., modifier 59 overuse, unusual combinations, high-RVU codes).\n' +
                    '8. Assign confidence: 95-100 = verified correct, 80-94 = likely correct but review recommended, 60-79 = uncertain needs human review, below 60 = likely incorrect.\n\n' +
                    'Respond with ONLY this JSON (no other text):\n' +
                    '{"verified_cpt":[{"code":"XXXXX","original_correct":true,"corrected_code":"","correction_reason":"","confidence":95,"audit_risk":"low|medium|high","audit_risk_reason":"","linked_icd10_verified":true,"cci_clear":true}],' +
                    '"verified_icd10":[{"code":"XXX.XXX","original_correct":true,"corrected_code":"","correction_reason":"","confidence":95,"specificity_check":"highest available"}],' +
                    '"missing_codes":[{"code":"XXXXX","description":"string","reason":"string","code_type":"CPT|ICD10|HCPCS"}],' +
                    '"overcoded":[{"code":"XXXXX","reason":"string"}],' +
                    '"bundling_issues":[{"codes":"XXXXX + XXXXX","issue":"string","resolution":"string","column1":"XXXXX","column2":"XXXXX","modifier_indicator":"0|1"}],' +
                    '"cci_pairs_checked":[{"code1":"XXXXX","code2":"XXXXX","edit_exists":false,"modifier_allowed":false,"status":"CLEAR|CONFLICT|RESOLVED"}],' +
                    '"overall_confidence":90,"audit_risk_score":"low|medium|high","audit_notes":"string","coding_accuracy_grade":"A|B|C|D|F"}';

                let verificationResult = null;
                try {
                    if (pdfImages && pdfImages.length > 0) {
                        const verifyParts = [];
                        pdfImages.slice(0, 20).forEach(img => {
                            verifyParts.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: img } });
                        });
                        verifyParts.push({ type: 'text', text: verificationPrompt });
                        const vResp = await fetch('https://api.anthropic.com/v1/messages', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
                            body: JSON.stringify({ model: model, max_tokens: 4096, temperature: 0, system: 'You are a senior certified coding auditor (CPC, CCS, CPMA) performing second-pass verification. You must catch any coding errors from the first pass. Be strict and precise. Respond with ONLY valid JSON.', messages: [{ role: 'user', content: verifyParts }] })
                        });
                        if (vResp.ok) {
                            const vData = await vResp.json();
                            const vText = vData.content.find(c => c.type === 'text');
                            if (vText) verificationResult = parseJsonResponse(vText.text);
                        }
                    } else {
                        const vFullPrompt = verificationPrompt + '\n\nORIGINAL CLINICAL DOCUMENT:\n---\n' + input.substring(0, 80000) + '\n---';
                        const vResp = await fetch('https://api.anthropic.com/v1/messages', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
                            body: JSON.stringify({ model: model, max_tokens: 4096, temperature: 0, system: 'You are a senior certified coding auditor (CPC, CCS, CPMA) performing second-pass verification. You must catch any coding errors from the first pass. Be strict and precise. Respond with ONLY valid JSON.', messages: [{ role: 'user', content: vFullPrompt }] })
                        });
                        if (vResp.ok) {
                            const vData = await vResp.json();
                            const vText = vData.content.find(c => c.type === 'text');
                            if (vText) verificationResult = parseJsonResponse(vText.text);
                        }
                    }
                } catch (vErr) { console.warn('Verification pass failed:', vErr); }

                // Apply verification results - update confidence and flag corrections
                const applyVerification = (cptCodes, icd10Codes, verification) => {
                    if (!verification) return { cptCodes, icd10Codes, corrections: [], missingCodes: [], auditGrade: 'N/A', auditRisk: 'unknown', overallConfidence: 0 };
                    const corrections = [];
                    const updatedCpt = cptCodes.map(c => {
                        const v = (verification.verified_cpt || []).find(vc => vc.code === c.code);
                        if (v) {
                            c.confidence = v.confidence;
                            c.audit_risk = v.audit_risk || 'low';
                            c.verified = v.original_correct !== false;
                            if (!v.original_correct && v.corrected_code) {
                                corrections.push({ original: c.code, corrected: v.corrected_code, reason: v.correction_reason });
                                c.correction = { code: v.corrected_code, reason: v.correction_reason };
                            }
                        }
                        return c;
                    });
                    const updatedIcd = icd10Codes.map(c => {
                        const v = (verification.verified_icd10 || []).find(vi => vi.code === c.code);
                        if (v) {
                            c.confidence = v.confidence;
                            c.verified = v.original_correct !== false;
                            if (!v.original_correct && v.corrected_code) {
                                corrections.push({ original: c.code, corrected: v.corrected_code, reason: v.correction_reason });
                                c.correction = { code: v.corrected_code, reason: v.correction_reason };
                            }
                        }
                        return c;
                    });
                    return {
                        cptCodes: updatedCpt,
                        icd10Codes: updatedIcd,
                        corrections,
                        missingCodes: verification.missing_codes || [],
                        overcodedFlags: verification.overcoded || [],
                        bundlingIssues: verification.bundling_issues || [],
                        auditGrade: verification.coding_accuracy_grade || 'N/A',
                        auditRisk: verification.audit_risk_score || 'low',
                        overallConfidence: verification.overall_confidence || 0,
                        auditNotes: verification.audit_notes || ''
                    };
                };

                const icd10 = (aiResult.icd10_codes || []).map(c => ({
                    code: c.code,
                    desc: c.description,
                    type: c.type,
                    specificity: c.specificity_note || '',
                    confidence: 90,
                    hcc_code: c.hcc_code || '',
                    hcc_category: c.hcc_category || '',
                    hcc_weight: c.hcc_weight || 0,
                    raf_impact: c.raf_impact || '',
                    hcc_alternatives: c.hcc_alternatives || [],
                    specificity_improvement: c.specificity_improvement || ''
                }));

                const cpt = (aiResult.cpt_codes || []).map(c => ({
                    code: c.code,
                    desc: c.description,
                    modifiers: c.modifiers || [],
                    modifier_reasons: c.modifier_reasons || [],
                    units: c.units || 1,
                    rvu: c.rvu_work || 0,
                    reim: c.estimated_reimbursement || '-',
                    is_addon: c.is_addon || false,
                    primary_code: c.primary_code || '',
                    global_period: c.global_period || '',
                    global_period_days: c.global_period_days || 0,
                    linked_icd10: c.linked_icd10 || [],
                    cci_checked: c.cci_checked !== false,
                    denial_risk: c.denial_risk || 'low',
                    denial_reason: c.denial_reason || ''
                }));

                const hcpcs = (aiResult.hcpcs_codes || []).map(c => ({
                    code: c.code,
                    desc: c.description,
                    units: c.units || 1,
                    reason: c.reason || '',
                    linked_icd10: c.linked_icd10 || []
                }));

                const audit = applyVerification(cpt, icd10, verificationResult);
                const totalRvu = audit.cptCodes.reduce((sum, c) => sum + (parseFloat(c.rvu) || 0), 0);

                const finalResults = {
                    icd10: audit.icd10Codes,
                    cpt: audit.cptCodes,
                    hcpcs,
                    rvu: totalRvu.toFixed(2),
                    modifiers: aiResult.modifiers_applied || [],
                    ncci: aiResult.ncci_cci_analysis || [],
                    mue: aiResult.mue_check || [],
                    medNecessity: aiResult.medical_necessity || [],
                    posValidation: aiResult.pos_validation || [],
                    iomTransmittals: aiResult.iom_transmittal_references || [],
                    liveCoverage: coverageData || null,
                    docReview: {
                        score: aiResult.documentation_findings?.completeness_score || 0,
                        strengths: aiResult.documentation_findings?.strengths || [],
                        deficiencies: aiResult.documentation_findings?.deficiencies || [],
                        recommendations: aiResult.documentation_findings?.recommendations || [],
                        cdiQueries: aiResult.documentation_findings?.cdi_queries || []
                    },
                    denialRisk: aiResult.denial_risk_summary || { overall_risk: 'low', total_lines: 0, high_risk_lines: 0, risk_factors: [] },
                    abnRequired: aiResult.abn_required || [],
                    emLevel: aiResult.em_level || null,
                    payerAlerts: aiResult.payer_alerts || [],
                    procedureSummary: aiResult.procedure_summary || '',
                    detectedSpecialty: aiResult.specialty_detected || specialty,
                    aiPowered: true,
                    chunksProcessed: totalChunks,
                    verification: {
                        corrections: audit.corrections,
                        missingCodes: audit.missingCodes,
                        overcodedFlags: audit.overcodedFlags || [],
                        bundlingIssues: audit.bundlingIssues || [],
                        cciPairsChecked: verificationResult ? (verificationResult.cci_pairs_checked || []) : [],
                        auditGrade: audit.auditGrade,
                        auditRisk: audit.auditRisk,
                        overallConfidence: audit.overallConfidence,
                        auditNotes: audit.auditNotes,
                        verified: !!verificationResult
                    },
                    claimMeta: {
                        payer: payer,
                        state: stateCode,
                        mac: macInfo ? macInfo.mac + ' (' + macInfo.jurisdiction + ')' : '',
                        pos: posInfo ? posInfo.code + ' - ' + posInfo.name : '',
                        posCode: placeOfService,
                        specialty: specialty,
                        docType: docType,
                        patientDoc: fileName || 'Manual Entry',
                        dateProcessed: new Date().toISOString(),
                        model: model,
                        renderNpi: renderNpi,
                        billingNpi: '',
                        patientAcct: patientAcct
                    },
                    patientDemographics: aiResult.patient_demographics || null
                };
                setResults(finalResults);
                setResultTab('codes');

                // Auto-fill patient demographics, guarantor, and insurance from extracted data
                const pd = aiResult.patient_demographics;
                if (pd) {
                    let fieldsFound = 0;
                    if (pd.patient_first_name) { setPatientFirstName(pd.patient_first_name); fieldsFound++; }
                    if (pd.patient_last_name) { setPatientLastName(pd.patient_last_name); fieldsFound++; }
                    if (pd.date_of_birth) { setPatientDob(pd.date_of_birth); fieldsFound++; }
                    if (pd.sex) { setPatientSex(pd.sex); fieldsFound++; }
                    if (pd.date_of_service) { setDateOfService(pd.date_of_service); fieldsFound++; }
                    if (pd.patient_street1) { setPatientStreet1(pd.patient_street1); fieldsFound++; }
                    if (pd.patient_street2) { setPatientStreet2(pd.patient_street2); fieldsFound++; }
                    if (pd.patient_city) { setPatientCity(pd.patient_city); fieldsFound++; }
                    if (pd.patient_state) { setPatientState(pd.patient_state); fieldsFound++; }
                    if (pd.patient_zip) { setPatientZip(pd.patient_zip); fieldsFound++; }
                    if (pd.home_phone) { setPatientHomePhone(pd.home_phone); fieldsFound++; }
                    if (pd.mobile_phone) { setPatientMobilePhone(pd.mobile_phone); fieldsFound++; }
                    if (pd.guarantor_relation && pd.guarantor_relation !== 'Self') { setGuarantorRelation(pd.guarantor_relation); fieldsFound++; }
                    if (pd.guarantor_primary_phone) { setGuarantorPrimaryPhone(pd.guarantor_primary_phone); fieldsFound++; }
                    if (pd.guarantor_secondary_phone) { setGuarantorSecondaryPhone(pd.guarantor_secondary_phone); fieldsFound++; }
                    if (pd.guarantor_street) { setGuarantorStreet(pd.guarantor_street); fieldsFound++; }
                    if (pd.guarantor_city) { setGuarantorCity(pd.guarantor_city); fieldsFound++; }
                    if (pd.guarantor_state) { setGuarantorState(pd.guarantor_state); fieldsFound++; }
                    if (pd.guarantor_zip) { setGuarantorZip(pd.guarantor_zip); fieldsFound++; }
                    if (pd.insurance_payer_name && !payer) { setPayer(pd.insurance_payer_name); fieldsFound++; }
                    if (pd.insurance_plan_name) { setInsurancePlanName(pd.insurance_plan_name); fieldsFound++; }
                    if (pd.insurance_plan_type) { setPlanType(pd.insurance_plan_type); fieldsFound++; }
                    if (pd.insurance_policy_id) { setInsurancePolicyId(pd.insurance_policy_id); fieldsFound++; }
                    if (pd.insurance_group_number) { setInsuranceGroupNumber(pd.insurance_group_number); fieldsFound++; }
                    if (fieldsFound > 0) {
                        setAiStatus('Analysis complete — 2-pass verified' + (audit.auditGrade ? ' (Audit Grade: ' + audit.auditGrade + ', Confidence: ' + audit.overallConfidence + '%)' : '') + ' | Auto-filled ' + fieldsFound + ' patient/insurance field(s) from document' + (totalChunks > 1 ? ' (' + totalChunks + ' sections)' : ''));
                    } else {
                        setAiStatus('Analysis complete — 2-pass verified' + (audit.auditGrade ? ' (Audit Grade: ' + audit.auditGrade + ', Confidence: ' + audit.overallConfidence + '%)' : '') + (totalChunks > 1 ? ' (' + totalChunks + ' sections processed)' : ''));
                    }
                } else {
                    setAiStatus('Analysis complete — 2-pass verified' + (audit.auditGrade ? ' (Audit Grade: ' + audit.auditGrade + ', Confidence: ' + audit.overallConfidence + '%)' : '') + (totalChunks > 1 ? ' (' + totalChunks + ' sections processed)' : ''));
                }
            } catch (err) {
                setAiStatus('Error: ' + err.message);
            }
            setLoading(false);
        };

        const buildClaimData = (r) => {
            if (!r) return {};
            const posCode = r.claimMeta ? r.claimMeta.posCode || '' : '';
            const lines = [];
            let lineNum = 1;
            (r.cpt || []).forEach(c => {
                const finalCode = c.correction ? c.correction.code : c.code;
                const dxPtrs = (c.linked_icd10 && c.linked_icd10.length > 0) ? c.linked_icd10 : (r.icd10 || []).slice(0, 4).map(d => d.code);
                const hasBundling = (r.verification?.bundlingIssues || []).some(b => b.codes && b.codes.includes(c.code));
                // Auto-calculate charge at 200% of Medicare local MAC allowable rate
                const feeData = lookupFeeSchedule(finalCode, r.claimMeta?.state || stateCode || '');
                const units = c.units || 1;
                let medicareAllowable = feeData ? feeData.payment : 0;
                // Dynamic fallback: if code not in static fee schedule, use AI's estimated_reimbursement
                if (medicareAllowable === 0 && c.estimated_reimbursement) {
                    const parsed = parseFloat(String(c.estimated_reimbursement).replace(/[^0-9.]/g, ''));
                    if (parsed > 0) medicareAllowable = parsed;
                }
                const autoCharge = medicareAllowable > 0 ? Math.round(medicareAllowable * 2 * units * 100) / 100 : '';
                lines.push({
                    line: lineNum, code: finalCode, type: 'CPT', description: c.desc,
                    modifiers: c.modifiers || [], units: units,
                    dxPointers: dxPtrs.map((_, di) => String.fromCharCode(65 + ((r.icd10 || []).findIndex(d => d.code === dxPtrs[di]) >= 0 ? (r.icd10 || []).findIndex(d => d.code === dxPtrs[di]) : di))),
                    icd10_1: dxPtrs[0] || '', icd10_2: dxPtrs[1] || '', icd10_3: dxPtrs[2] || '', icd10_4: dxPtrs[3] || '',
                    pos: posCode, charge: autoCharge, medicareAllowable: medicareAllowable, globalPeriod: c.global_period || '',
                    cciStatus: hasBundling ? 'REVIEW' : 'CLEAR', confidence: c.confidence || 0,
                    isAddon: c.is_addon || false, rvu: c.rvu || 0
                });
                lineNum++;
            });
            (r.hcpcs || []).forEach(c => {
                const dxPtrs = (c.linked_icd10 && c.linked_icd10.length > 0) ? c.linked_icd10 : (r.icd10 || []).slice(0, 2).map(d => d.code);
                const hcpcsFee = lookupFeeSchedule(c.code, r.claimMeta?.state || stateCode || '');
                const hcpcsUnits = c.units || 1;
                let hcpcsAllowable = hcpcsFee ? hcpcsFee.payment : 0;
                if (hcpcsAllowable === 0 && c.estimated_reimbursement) {
                    const hParsed = parseFloat(String(c.estimated_reimbursement).replace(/[^0-9.]/g, ''));
                    if (hParsed > 0) hcpcsAllowable = hParsed;
                }
                const hcpcsCharge = hcpcsAllowable > 0 ? Math.round(hcpcsAllowable * 2 * hcpcsUnits * 100) / 100 : '';
                lines.push({
                    line: lineNum, code: c.code, type: 'HCPCS', description: c.desc,
                    modifiers: [], units: hcpcsUnits,
                    dxPointers: dxPtrs.map((_, di) => String.fromCharCode(65 + di)),
                    icd10_1: dxPtrs[0] || '', icd10_2: dxPtrs[1] || '',
                    icd10_3: '', icd10_4: '',
                    pos: posCode, charge: hcpcsCharge, medicareAllowable: hcpcsAllowable, globalPeriod: '', cciStatus: 'N/A', confidence: 0
                });
                lineNum++;
            });
            const icd10List = (r.icd10 || []).map((d, i) => ({ pointer: String.fromCharCode(65 + i), code: d.code, description: d.desc, type: d.type }));
            return {
                claimId: 'CLM-' + Date.now().toString(36).toUpperCase(),
                document: r.claimMeta?.patientDoc || 'Unknown',
                payer: r.claimMeta?.payer || '',
                state: r.claimMeta?.state || '',
                mac: r.claimMeta?.mac || '',
                pos: r.claimMeta?.pos || '',
                specialty: r.claimMeta?.specialty || '',
                dateProcessed: r.claimMeta?.dateProcessed || new Date().toISOString(),
                auditGrade: r.verification?.auditGrade || 'N/A',
                overallConfidence: r.verification?.overallConfidence || 0,
                cciClear: (r.verification?.bundlingIssues || []).length === 0,
                claimLines: lines,
                icd10List: icd10List,
                procedureSummary: r.procedureSummary || '',
                totalRvu: r.rvu || '0',
                timelyFilingDeadline: (() => {
                    const pg = PAYER_GUIDELINES[r.claimMeta?.payer] || PAYER_GUIDELINES['Medicare'];
                    return pg?.reimbursement?.timely_filing || 'Check payer contract';
                })()
            };
        };

        const pg = PAYER_GUIDELINES[payer] || PAYER_GUIDELINES['Medicare'];

        return (
            <div className="space-y-6">
                <div><h2 style={{ fontSize: '1.875rem', fontWeight: 800, color: '#f1f5f9', letterSpacing: '-0.025em' }}>AI-Powered Medical Coding Engine</h2><p style={{ color: 'rgba(255,255,255,0.45)', marginTop: '.25rem', fontSize: '.925rem' }}>Intelligent code extraction with payer-specific guideline cross-referencing across 14 specialties</p></div>
                <div className="flex items-center gap-3 mb-4">
                    <button onClick={() => setBatchMode(false)} style={{ padding: '.5rem 1.25rem', fontSize: '.8125rem', fontWeight: 600, borderRadius: 'var(--radius-md)', background: !batchMode ? 'var(--gradient-accent)' : 'rgba(255,255,255,0.05)', color: !batchMode ? 'white' : 'rgba(255,255,255,0.6)', border: 'none', cursor: 'pointer', transition: 'all .2s ease', boxShadow: !batchMode ? '0 2px 8px rgba(99,102,241,0.25)' : 'none' }}>Single Document</button>
                    <button onClick={() => setBatchMode(true)} style={{ padding: '.5rem 1.25rem', fontSize: '.8125rem', fontWeight: 600, borderRadius: 'var(--radius-md)', background: batchMode ? 'var(--gradient-accent)' : 'rgba(255,255,255,0.05)', color: batchMode ? 'white' : 'rgba(255,255,255,0.6)', border: 'none', cursor: 'pointer', transition: 'all .2s ease', boxShadow: batchMode ? '0 2px 8px rgba(99,102,241,0.25)' : 'none' }}>Batch Processing</button>
                </div>
                {batchMode && (
                    <div className="card-premium mb-4" style={{ padding: '1.75rem' }}>
                        <h3 className="text-lg font-semibold text-gray-900 mb-2">Batch Processing</h3>
                        <p className="text-xs text-gray-500 mb-4">Upload multiple medical records for sequential AI-powered coding. Each file will be processed with the same specialty, payer, and POS settings.</p>
                        <div className="grid grid-cols-1 md-grid-cols-4 gap-4 mb-4">
                            <div><label style={{ display: 'block', fontSize: '.8125rem', fontWeight: 600, color: 'rgba(255,255,255,0.6)', marginBottom: '.375rem' }}>Specialty</label><select className="input" value={specialty} onChange={e => setSpecialty(e.target.value)}>{specialties.map(s => <option key={s}>{s}</option>)}</select></div>
                            <div><label style={{ display: 'block', fontSize: '.8125rem', fontWeight: 600, color: 'rgba(255,255,255,0.6)', marginBottom: '.375rem' }}>Payer</label><select className="input" value={payer} onChange={e => setPayer(e.target.value)}>{payerGroups.map(g => <optgroup key={g.group} label={g.group}>{g.payers.map(p => <option key={p} value={p}>{p}</option>)}</optgroup>)}</select></div>
                            <div><label style={{ display: 'block', fontSize: '.8125rem', fontWeight: 600, color: 'rgba(255,255,255,0.6)', marginBottom: '.375rem' }}>State</label><select className="input" value={stateCode} onChange={e => setStateCode(e.target.value)}>{stateList.map(s => <option key={s.code} value={s.code}>{s.label}</option>)}</select></div>
                            <div><label style={{ display: 'block', fontSize: '.8125rem', fontWeight: 600, color: 'rgba(255,255,255,0.6)', marginBottom: '.375rem' }}>POS</label><select className="input" value={placeOfService} onChange={e => setPlaceOfService(e.target.value)}>{posCodeList.map(p => <option key={p.code} value={p.code}>{p.label}</option>)}</select></div>
                        </div>
