                                        <p className="text-xs text-blue-800">This claim data has been verified through a two-pass AI coding and audit pipeline. CCI/NCCI edit pairs have been checked for all code combinations. Each CPT/HCPCS code includes ICD-10 diagnosis pointers for claim form Box 24E. Review any flagged items before final submission to your clearinghouse.</p>
                                    </div>

                                    {savedClaims.length > 0 && (
                                        <div className="mt-6">
                                            <div className="flex items-center justify-between mb-3">
                                                <h5 className="font-semibold text-gray-900">Saved Claims Queue ({savedClaims.length})</h5>
                                                <button onClick={() => {
                                                    const blob = new Blob([JSON.stringify(savedClaims, null, 2)], { type: 'application/json' });
                                                    const url = URL.createObjectURL(blob);
                                                    const a = document.createElement('a'); a.href = url; a.download = 'all_claims_' + new Date().toISOString().slice(0, 10) + '.json'; a.click();
                                                    URL.revokeObjectURL(url);
                                                }} className="px-3 py-1.5 text-xs font-semibold rounded" style={{ background: 'rgba(192,132,252,0.06)', color: '#a78bfa', border: '1px solid rgba(192,132,252,0.25)', cursor: 'pointer', borderRadius: 'var(--radius-sm)' }}>Export All Claims</button>
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-sm">
                                                    <thead style={{ background: 'rgba(255,255,255,0.03)', borderBottom: '2px solid rgba(255,255,255,0.05)' }}>
                                                        <tr>
                                                            <th className="px-3 py-2 text-left font-semibold">#</th>
                                                            <th className="px-3 py-2 text-left font-semibold">Claim ID</th>
                                                            <th className="px-3 py-2 text-left font-semibold">Document</th>
                                                            <th className="px-3 py-2 text-left font-semibold">Payer</th>
                                                            <th className="px-3 py-2 text-center font-semibold">Lines</th>
                                                            <th className="px-3 py-2 text-center font-semibold">Grade</th>
                                                            <th className="px-3 py-2 text-left font-semibold">Date</th>
                                                            <th className="px-3 py-2 text-left font-semibold">Timely Filing</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y">
                                                        {savedClaims.map((sc, si) => (
                                                            <tr key={si}>
                                                                <td className="px-3 py-2 text-gray-500">{si + 1}</td>
                                                                <td className="px-3 py-2 font-mono text-xs">{sc.claimId}</td>
                                                                <td className="px-3 py-2 text-xs">{sc.document}</td>
                                                                <td className="px-3 py-2 text-xs">{sc.payer}</td>
                                                                <td className="px-3 py-2 text-center">{(sc.claimLines || []).length}</td>
                                                                <td className="px-3 py-2 text-center"><span className="px-2 py-0.5 rounded text-xs font-bold" style={{ background: sc.auditGrade === 'A' ? 'rgba(110,231,183,0.1)' : 'rgba(253,230,138,0.1)', color: sc.auditGrade === 'A' ? '#10b981' : '#fde68a' }}>{sc.auditGrade}</span></td>
                                                                <td className="px-3 py-2 text-xs text-gray-500">{sc.dateProcessed ? new Date(sc.dateProcessed).toLocaleString() : ''}</td>
                                                                <td className="px-3 py-2 text-xs" style={{ color: '#fde68a' }}>{sc.timelyFilingDeadline}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // ========== REPORTS PAGE ==========
    const ReportsPage = () => {
        const [reports, setReports] = React.useState(() => ReportsStorageManager.getReports());
        const [filterDos, setFilterDos] = React.useState('');
        const [filterProvider, setFilterProvider] = React.useState('');
        const [filterFacility, setFilterFacility] = React.useState('');
        const [filterPatient, setFilterPatient] = React.useState('');
        const [selected, setSelected] = React.useState([]);
        const [expandedId, setExpandedId] = React.useState(null);
        const [sortField, setSortField] = React.useState('createdAt');
        const [sortDir, setSortDir] = React.useState('desc');

        const refresh = () => setReports(ReportsStorageManager.getReports());

        // Derive unique values for filter dropdowns
        const uniqueProviders = [...new Set(reports.map(r => r.providerName).filter(Boolean))];
        const uniqueFacilities = [...new Set(reports.map(r => r.facilityName).filter(Boolean))];

        // Filter
        const filtered = reports.filter(r => {
            if (filterDos && r.dateOfService !== filterDos) return false;
            if (filterProvider && r.providerName !== filterProvider) return false;
            if (filterFacility && r.facilityName !== filterFacility) return false;
            if (filterPatient && !(r.patientLastName || '').toLowerCase().includes(filterPatient.toLowerCase())) return false;
            return true;
        });

        // Sort
        const sorted = [...filtered].sort((a, b) => {
            let va = a[sortField] || '', vb = b[sortField] || '';
            if (sortField === 'createdAt') { va = new Date(va).getTime() || 0; vb = new Date(vb).getTime() || 0; }
            if (typeof va === 'string') va = va.toLowerCase();
            if (typeof vb === 'string') vb = vb.toLowerCase();
            if (va < vb) return sortDir === 'asc' ? -1 : 1;
            if (va > vb) return sortDir === 'asc' ? 1 : -1;
            return 0;
        });

        const toggleSelect = (id) => setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
        const toggleAll = () => {
            if (selected.length === sorted.length) setSelected([]);
            else setSelected(sorted.map(r => r.id));
        };

        const deleteReport = (id) => {
            ReportsStorageManager.deleteReport(id);
            setSelected(prev => prev.filter(x => x !== id));
            refresh();
        };

        const downloadSinglePdf = (report) => {
            try {
                const doc = generateReportPdf(report);
                if (doc) {
                    const fname = 'coding_report_' + (report.patientLastName || 'patient').replace(/\s+/g, '_') + '_' + (report.dateOfService || 'unknown') + '.pdf';
                    doc.save(fname);
                    return;
                }
            } catch (e) { console.error('PDF gen error:', e); }
            // Fallback: generate a comprehensive plain-text report if jsPDF isn't available
            try {
                const L = [];
                L.push('═══════════════════════════════════════════════════════════════');
                L.push('           COMPREHENSIVE MEDICAL CODING REPORT');
                L.push('═══════════════════════════════════════════════════════════════');
                L.push('Report ID:       ' + (report.id || ''));
                L.push('Generated:       ' + (report.createdAt ? new Date(report.createdAt).toLocaleString() : ''));
                L.push('Date of Service: ' + (report.dateOfService || 'N/A'));
                L.push('Payer: ' + (report.payer || 'N/A') + '   |   Specialty: ' + (report.specialty || 'N/A'));
                L.push('');
                L.push('───── PATIENT & PROVIDER ─────');
                L.push('Patient:  ' + (report.patientLastName || '') + ', ' + (report.patientFirstName || '') + '   DOB: ' + (report.patientDob || 'N/A') + '   Sex: ' + (report.patientSex || '') + '   Acct#: ' + (report.patientAcct || 'N/A'));
                L.push('Provider: ' + (report.providerName || 'N/A') + '   NPI: ' + (report.providerNpi || 'N/A'));
                L.push('Facility: ' + (report.facilityName || 'N/A') + '   NPI: ' + (report.facilityNpi || 'N/A') + '   POS: ' + (report.placeOfService || 'N/A'));
                L.push('');
                if (report.procedureSummary) { L.push('───── PROCEDURE SUMMARY ─────'); L.push(report.procedureSummary); L.push(''); }
                if (report.cptCodes && report.cptCodes.length > 0) {
                    L.push('───── CPT / HCPCS CODES & CHARGES ─────');
                    L.push('Code      Description                            Units  Mod    Allow.      Charge     Risk');
                    L.push('─────────────────────────────────────────────────────────────────────────────────────────');
                    report.cptCodes.forEach(c => {
                        const desc = (c.description || '').substring(0, 38).padEnd(38);
                        L.push((c.code || '').padEnd(10) + desc + String(c.units || 1).padEnd(7) + ((c.modifiers || []).join(',') || '').padEnd(7) + (c.medicareAllowable ? '$' + Number(c.medicareAllowable).toFixed(2) : '-').padEnd(12) + (c.charge ? '$' + Number(c.charge).toFixed(2) : '-').padEnd(11) + (c.denial_risk || ''));
                        if (c.denial_reason) L.push('          Denial Reason: ' + c.denial_reason);
                    });
                    const totAllow = report.cptCodes.reduce((s, c) => s + (Number(c.medicareAllowable) || 0) * (c.units || 1), 0);
                    const totCharge = report.cptCodes.reduce((s, c) => s + (Number(c.charge) || 0), 0);
                    L.push('─────────────────────────────────────────────────────────────────────────────────────────');
                    L.push('TOTALS:   Allowable: $' + totAllow.toFixed(2) + '   Charge: $' + totCharge.toFixed(2));
                    L.push('');
                }
                if (report.icd10Codes && report.icd10Codes.length > 0) {
                    L.push('───── DIAGNOSIS CODES (ICD-10) & RISK ADJUSTMENT (HCC) ─────');
                    L.push('(ICD-10 = International Classification of Diseases codes describing the patient\'s conditions)');
                    L.push('(HCC = Hierarchical Condition Categories used by Medicare to predict healthcare costs)');
                    L.push('');
                    report.icd10Codes.forEach((d, i) => {
                        let line = '  ' + String.fromCharCode(65 + i) + '. ' + d.code + ' — ' + (d.description || '');
                        if (d.hcc_code) line += '\n       Maps to: ' + d.hcc_code + (d.hcc_category ? ' (' + d.hcc_category + ')' : '') + (d.hcc_weight ? '  |  Risk Adjustment Factor Weight: ' + d.hcc_weight : '');
                        if (d.raf_impact) line += '\n       Impact: ' + d.raf_impact;
                        if (d.specificity) line += '\n       Specificity Note: ' + d.specificity;
                        L.push(line);
                        // HCC Improvement Recommendations
                        if (d.specificity_improvement) {
                            L.push('       ** RISK ADJUSTMENT IMPROVEMENT: ' + d.specificity_improvement);
                        }
                        if (d.hcc_alternatives && d.hcc_alternatives.length > 0) {
                            L.push('       ** RECOMMENDED ALTERNATIVE CODES FOR BETTER RISK ADJUSTMENT:');
                            d.hcc_alternatives.forEach((alt, ai) => {
                                L.push('          ' + (ai + 1) + '. ' + (alt.code || '') + ' — ' + (alt.description || ''));
                                let altDetail = [];
                                if (alt.hcc_code) altDetail.push('Maps to: ' + alt.hcc_code);
                                if (alt.hcc_category) altDetail.push('Category: ' + alt.hcc_category);
                                if (alt.hcc_weight) altDetail.push('Risk Adjustment Factor Weight: ' + alt.hcc_weight);
                                if (altDetail.length > 0) L.push('             ' + altDetail.join('  |  '));
                                if (alt.rationale) L.push('             Reason: ' + alt.rationale);
                            });
                        }
                        L.push('');
                    });
                    const hccCodes = report.icd10Codes.filter(d => d.hcc_code || d.hcc_weight);
                    if (hccCodes.length > 0) {
                        const totalRaf = hccCodes.reduce((s, d) => s + (Number(d.hcc_weight) || 0), 0);
                        L.push('  RISK ADJUSTMENT SUMMARY:');
                        L.push('  ' + hccCodes.length + ' out of ' + report.icd10Codes.length + ' diagnosis codes map to Hierarchical Condition Categories');
                        L.push('  Combined Risk Adjustment Factor Weight: ' + totalRaf.toFixed(4));
                    }
                    L.push('');
                }
                if (report.emLevel) {
                    L.push('───── E/M LEVEL DETERMINATION ─────');
                    L.push('Level: ' + (report.emLevel.determined_level || 'N/A') + '   MDM: ' + (report.emLevel.mdm_complexity || 'N/A'));
                    if (report.emLevel.problems_addressed) L.push('Problems Addressed: ' + report.emLevel.problems_addressed);
                    if (report.emLevel.key_factors) L.push('Key Factors: ' + report.emLevel.key_factors);
                    L.push('');
                }
                L.push('───── AUDIT & VERIFICATION ─────');
                L.push('Audit Grade: ' + (report.auditGrade || 'N/A') + '   Confidence: ' + (report.overallConfidence || 0) + '%   Audit Risk: ' + (report.auditRisk || 'N/A'));
                if (report.auditNotes) { L.push('Audit Notes: ' + report.auditNotes); }
                if (report.corrections && report.corrections.length > 0) {
                    L.push(''); L.push('CODE CORRECTIONS:');
                    report.corrections.forEach((c, i) => L.push('  ' + (i + 1) + '. ' + (c.original || '') + ' -> ' + (c.corrected || '') + (c.reason ? ' | ' + c.reason : '')));
                }
                if (report.missingCodes && report.missingCodes.length > 0) {
                    L.push(''); L.push('MISSING CODES:');
                    report.missingCodes.forEach((mc, i) => L.push('  ' + (i + 1) + '. ' + (mc.code || '') + ' (' + (mc.code_type || '') + ') — ' + (mc.description || '') + (mc.reason ? ' | ' + mc.reason : '')));
                }
                if (report.overcodedFlags && report.overcodedFlags.length > 0) {
                    L.push(''); L.push('OVERCODING FLAGS:');
                    report.overcodedFlags.forEach((oc, i) => L.push('  ' + (i + 1) + '. ' + (oc.code || '') + ' — ' + (oc.reason || '')));
                }
                L.push('');
                if (report.denialRisk) {
                    L.push('───── DENIAL PREVENTION ANALYSIS ─────');
                    const dr = report.denialRisk;
                    L.push('Overall Denial Risk: ' + (dr.overall_risk || dr.overallRisk || 'N/A'));
                    const factors = dr.risk_factors || dr.riskFactors || [];
                    if (factors.length > 0) { L.push('Risk Factors:'); factors.forEach(f => L.push('  - ' + (typeof f === 'string' ? f : (f.factor || f.description || JSON.stringify(f))))); }
                    const hrLines = dr.high_risk_lines || dr.highRiskLines || [];
                    if (hrLines.length > 0) { L.push('High-Risk Lines:'); hrLines.forEach(hl => L.push('  ! ' + (typeof hl === 'string' ? hl : (hl.code ? hl.code + ' — ' + (hl.reason || '') : JSON.stringify(hl))))); }
                    L.push('');
                }
                if (report.bundlingIssues && report.bundlingIssues.length > 0) {
                    L.push('───── BUNDLING / NCCI ISSUES ─────');
                    report.bundlingIssues.forEach((bi, i) => { L.push('  ' + (i + 1) + '. Codes: ' + (Array.isArray(bi.codes) ? bi.codes.join(', ') : (bi.codes || ''))); if (bi.issue) L.push('     Issue: ' + bi.issue); if (bi.resolution) L.push('     Resolution: ' + bi.resolution); });
                    L.push('');
                }
                if (report.abnRequired && report.abnRequired.length > 0) {
                    L.push('───── ABN REQUIREMENTS ─────');
                    report.abnRequired.forEach((abn, i) => { L.push('  ' + (i + 1) + '. Code ' + (abn.code || '') + ' — ABN Required'); if (abn.reason) L.push('     Reason: ' + abn.reason); if (abn.lcd_reference) L.push('     LCD: ' + abn.lcd_reference); });
                    L.push('');
                }
                L.push('───── RECOMMENDATIONS ─────');
                const recs = [];
                if (report.corrections && report.corrections.length > 0) recs.push('Review and apply ' + report.corrections.length + ' code correction(s).');
                if (report.missingCodes && report.missingCodes.length > 0) recs.push('Add ' + report.missingCodes.length + ' missing code(s) for complete claim submission.');
                if (report.overcodedFlags && report.overcodedFlags.length > 0) recs.push('Review ' + report.overcodedFlags.length + ' overcoding flag(s).');
                if (report.bundlingIssues && report.bundlingIssues.length > 0) recs.push('Address ' + report.bundlingIssues.length + ' bundling/NCCI issue(s).');
                if (report.abnRequired && report.abnRequired.length > 0) recs.push('Obtain ABN for ' + report.abnRequired.length + ' procedure(s).');
                if (recs.length === 0) recs.push('No critical issues. Standard documentation review recommended.');
                recs.forEach((r, i) => L.push('  ' + (i + 1) + '. ' + r));
                L.push('');
                L.push('═══════════════════════════════════════════════════════════════');
                L.push('VanguardRCM Platform  |  CONFIDENTIAL');
                const blob = new Blob([L.join('\n')], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'coding_report_' + (report.patientLastName || 'patient').replace(/\s+/g, '_') + '_' + (report.dateOfService || 'unknown') + '.txt';
                a.click();
                URL.revokeObjectURL(url);
            } catch (fallbackErr) { console.error('Fallback report error:', fallbackErr); alert('Unable to generate report. Check browser console for details.'); }
        };

        const downloadSelectedPdfs = () => {
            if (selected.length === 0) return;
            const selectedReports = reports.filter(r => selected.includes(r.id));
            selectedReports.forEach((report, idx) => {
                setTimeout(() => {
                    downloadSinglePdf(report);
                }, idx * 400);
            });
        };

        const SortHeader = ({ field, label }) => (
            <th className="px-3 py-2 text-left text-xs font-semibold cursor-pointer select-none" onClick={() => { if (sortField === field) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortField(field); setSortDir('asc'); } }}>
                {label} {sortField === field ? (sortDir === 'asc' ? '↑' : '↓') : ''}
            </th>
        );

        return (
            <div className="space-y-6">
                <div className="flex items-center justify-between">
                    <div>
                        <h2 style={{ fontSize: '1.875rem', fontWeight: 800, color: '#f1f5f9', letterSpacing: '-0.025em' }}>Coding Reports</h2>
                        <p style={{ color: 'rgba(255,255,255,0.45)', marginTop: '.25rem', fontSize: '.875rem' }}>{reports.length} report{reports.length !== 1 ? 's' : ''} stored — generated from AI medical coding analysis</p>
                    </div>
                    <div className="flex items-center gap-2">
                        {selected.length > 0 && (
                            <button onClick={downloadSelectedPdfs} className="btn btn-primary flex items-center gap-2" style={{ fontSize: '.8125rem' }}>
                                Download {selected.length} PDF{selected.length !== 1 ? 's' : ''}
                            </button>
                        )}
                        {reports.length > 0 && (
                            <button onClick={() => { if (confirm('Clear all reports? This cannot be undone.')) { ReportsStorageManager.clearAll(); setSelected([]); refresh(); } }} className="px-3 py-2 text-xs font-semibold rounded-lg" style={{ background: 'rgba(248,113,113,0.08)', color: '#fca5a5', border: '1px solid rgba(248,113,113,0.2)', cursor: 'pointer' }}>Clear All</button>
                        )}
                    </div>
                </div>

                {/* Filters */}
                <div className="card-premium" style={{ padding: '1rem 1.25rem' }}>
                    <div className="flex flex-wrap items-end gap-4">
                        <div>
                            <label className="text-xs font-medium mb-1" style={{ display: 'block', color: 'rgba(255,255,255,0.5)' }}>Date of Service</label>
                            <input type="date" className="input" value={filterDos} onChange={e => setFilterDos(e.target.value)} style={{ minWidth: '150px', fontSize: '.8125rem' }} />
                        </div>
                        <div>
                            <label className="text-xs font-medium mb-1" style={{ display: 'block', color: 'rgba(255,255,255,0.5)' }}>Provider</label>
                            <select className="input" value={filterProvider} onChange={e => setFilterProvider(e.target.value)} style={{ minWidth: '160px', fontSize: '.8125rem' }}>
                                <option value="">All Providers</option>
                                {uniqueProviders.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-xs font-medium mb-1" style={{ display: 'block', color: 'rgba(255,255,255,0.5)' }}>Facility</label>
                            <select className="input" value={filterFacility} onChange={e => setFilterFacility(e.target.value)} style={{ minWidth: '160px', fontSize: '.8125rem' }}>
                                <option value="">All Facilities</option>
                                {uniqueFacilities.map(f => <option key={f} value={f}>{f}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-xs font-medium mb-1" style={{ display: 'block', color: 'rgba(255,255,255,0.5)' }}>Patient Last Name</label>
                            <input type="text" className="input" placeholder="Search by last name..." value={filterPatient} onChange={e => setFilterPatient(e.target.value)} style={{ minWidth: '160px', fontSize: '.8125rem' }} />
                        </div>
                        {(filterDos || filterProvider || filterFacility || filterPatient) && (
                            <button onClick={() => { setFilterDos(''); setFilterProvider(''); setFilterFacility(''); setFilterPatient(''); }} className="px-3 py-2 text-xs font-semibold rounded-lg" style={{ background: 'rgba(255,255,255,0.05)', color: 'rgba(255,255,255,0.5)', border: '1px solid rgba(255,255,255,0.1)', cursor: 'pointer' }}>Clear Filters</button>
                        )}
                        <div className="ml-auto text-xs" style={{ color: 'rgba(255,255,255,0.4)' }}>
                            Showing {sorted.length} of {reports.length}
                        </div>
                    </div>
                </div>

                {/* Reports Table */}
                {sorted.length > 0 ? (
                    <div className="card-premium" style={{ padding: 0, overflow: 'hidden' }}>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm" style={{ minWidth: '900px' }}>
                                <thead style={{ background: 'rgba(255,255,255,0.03)', borderBottom: '2px solid rgba(255,255,255,0.06)' }}>
                                    <tr>
                                        <th className="px-3 py-2 text-center" style={{ width: '36px' }}>
                                            <input type="checkbox" checked={selected.length === sorted.length && sorted.length > 0} onChange={toggleAll} style={{ accentColor: '#c084fc' }} />
                                        </th>
                                        <SortHeader field="id" label="Report ID" />
                                        <SortHeader field="dateOfService" label="DOS" />
                                        <SortHeader field="patientLastName" label="Patient" />
                                        <SortHeader field="providerName" label="Provider" />
                                        <SortHeader field="facilityName" label="Facility" />
                                        <SortHeader field="specialty" label="Specialty" />
                                        <th className="px-3 py-2 text-center text-xs font-semibold">CPTs</th>
                                        <th className="px-3 py-2 text-center text-xs font-semibold">Grade</th>
                                        <th className="px-3 py-2 text-right text-xs font-semibold">Total Charge</th>
                                        <SortHeader field="createdAt" label="Generated" />
                                        <th className="px-3 py-2 text-center text-xs font-semibold">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y" style={{ borderColor: 'rgba(255,255,255,0.04)' }}>
                                    {sorted.map((r, idx) => {
                                        const totalCharge = (r.cptCodes || []).reduce((s, c) => s + (Number(c.charge) || 0), 0);
                                        const isExpanded = expandedId === r.id;
                                        return (
                                            <React.Fragment key={r.id}>
                                                <tr style={{ background: idx % 2 === 0 ? 'rgba(255,255,255,0.01)' : 'rgba(255,255,255,0.03)', cursor: 'pointer' }} onClick={() => setExpandedId(isExpanded ? null : r.id)}>
                                                    <td className="px-3 py-2 text-center" onClick={e => e.stopPropagation()}>
                                                        <input type="checkbox" checked={selected.includes(r.id)} onChange={() => toggleSelect(r.id)} style={{ accentColor: '#c084fc' }} />
                                                    </td>
                                                    <td className="px-3 py-2 font-mono text-xs" style={{ color: '#c084fc' }}>{r.id}</td>
                                                    <td className="px-3 py-2 font-mono text-xs">{r.dateOfService || '—'}</td>
                                                    <td className="px-3 py-2 text-sm font-medium" style={{ color: '#f1f5f9' }}>{(r.patientLastName || '') + (r.patientFirstName ? ', ' + r.patientFirstName : '') || '—'}</td>
                                                    <td className="px-3 py-2 text-xs">{r.providerName || '—'}</td>
                                                    <td className="px-3 py-2 text-xs">{r.facilityName || '—'}</td>

                ) : (

                        <p style={{ fontSize: '2rem', marginBottom: '.5rem' }}>📄</p>
                        <p className="text-lg font-semibold" style={{ color: '#f1f5f9' }}>{reports.length === 0 ? 'No Reports Yet' : 'No Reports Match Filters'}</p>

        const [editingFacilityId, setEditingFacilityId] = React.useState(null);
        const [editingProviderId, setEditingProviderId] = React.useState(null);

        const specialties = ['Primary Care', 'Internal Medicine', 'Cardiology', 'Orthopedics & Spine', 'Neurology', 'Psychiatry', 'General Surgery', 'Gastroenterology', 'Pulmonology', 'Dermatology', 'Urology', 'Oncology', 'Endocrinology', 'Rheumatology', 'Nephrology', 'Allergy & Immunology', 'Pain Management', 'Emergency Medicine', 'Urgent Care', 'OB/GYN', 'Pediatrics', 'Ophthalmology', 'ENT', 'Behavioral Health'];

        const commonPosCodes = [
            { code: '02', label: '02 - Telehealth (Other)' }, { code: '10', label: '10 - Telehealth (Home)' },
            { code: '11', label: '11 - Office' }, { code: '12', label: '12 - Home' },
            { code: '19', label: '19 - Off Campus-Outpatient Hospital' }, { code: '20', label: '20 - Urgent Care' },
            { code: '21', label: '21 - Inpatient Hospital' }, { code: '22', label: '22 - On Campus-Outpatient Hospital' },
            { code: '23', label: '23 - Emergency Room' }, { code: '24', label: '24 - ASC' },
            { code: '25', label: '25 - Birthing Center' }, { code: '31', label: '31 - SNF' },
            { code: '32', label: '32 - Nursing Facility' }, { code: '33', label: '33 - Custodial Care' },
            { code: '34', label: '34 - Hospice' }, { code: '41', label: '41 - Ambulance (Land)' },
            { code: '42', label: '42 - Ambulance (Air/Water)' }, { code: '49', label: '49 - Independent Clinic' },
            { code: '50', label: '50 - FQHC' }, { code: '51', label: '51 - Inpatient Psych' },

            { code: '55', label: '55 - Residential Substance Abuse' }, { code: '56', label: '56 - Psych Residential' },
            { code: '57', label: '57 - Non-Residential Substance Abuse' }, { code: '61', label: '61 - Inpatient Rehab' },
            { code: '62', label: '62 - Outpatient Rehab' }, { code: '65', label: '65 - ESRD Facility' },
            { code: '71', label: '71 - State/Local Public Health Clinic' }, { code: '72', label: '72 - Rural Health Clinic' },

        ];
        const toggleFacilityPos = (posCode, facState, setFacState) => {
            const current = Array.isArray(facState.pos) ? facState.pos : (facState.pos ? [facState.pos] : []);

        const loadPractice = (id) => {
            const p = practices.find(pr => pr.id === id);

                setFacilities(p.facilities || []);
                setProviders(p.providers || []);
                setEditingId(id);
                setShowForm(true);
            }

        const savePractice = () => {
            if (!form.name.trim()) return alert('Practice name is required');
            const data = { ...form, facilities, providers };
            if (editingId) {
                const updated = PracticeStorageManager.updatePractice(editingId, data);
                setPractices(PracticeStorageManager.getPractices());
                setEditingId(null);
            } else {
                PracticeStorageManager.addPractice(data);
                setPractices(PracticeStorageManager.getPractices());
            }
            resetForm();

        const resetForm = () => {
            setForm({ name: '', groupNpi: '', tin: '', ptan: '', specialty: '', street: '', city: '', state: '', zip: '', payToStreet: '', payToCity: '', payToState: '', payToZip: '', facilities: [], providers: [] });

                                    <span className="px-2 py-1 rounded text-xs font-semibold" style={{ background: typeof MPFS_KNOWLEDGE_BASE !== 'undefined' && Object.keys(MPFS_KNOWLEDGE_BASE).length > 0 ? 'rgba(110,231,183,0.1)' : 'rgba(253,230,138,0.1)', color: typeof MPFS_KNOWLEDGE_BASE !== 'undefined' && Object.keys(MPFS_KNOWLEDGE_BASE).length > 0 ? '#10b981' : '#fde68a' }}>{typeof MPFS_KNOWLEDGE_BASE !== 'undefined' ? Object.keys(MPFS_KNOWLEDGE_BASE).length + ' jurisdiction(s) loaded' : 'Not Found'}</span>
                                </div>
                                {typeof MPFS_KNOWLEDGE_BASE !== 'undefined' && Object.keys(MPFS_KNOWLEDGE_BASE).length > 0 && (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead style={{ background: 'rgba(255,255,255,0.03)', borderBottom: '2px solid rgba(255,255,255,0.05)' }}>
                                                <tr>
                                                    <th className="px-3 py-2 text-left font-semibold">Locality Key</th>
                                                    <th className="px-3 py-2 text-left font-semibold">Jurisdiction</th>
                                                    <th className="px-3 py-2 text-left font-semibold">MAC Contractor</th>
                                                    <th className="px-3 py-2 text-center font-semibold">Total Codes</th>
                                                    <th className="px-3 py-2 text-center font-semibold">Effective Date</th>
                                                    <th className="px-3 py-2 text-center font-semibold">CF</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {Object.entries(MPFS_KNOWLEDGE_BASE).map(([key, data]) => (
                                                    <tr key={key}>
                                                        <td className="px-3 py-2 font-mono font-semibold" style={{ color: '#c084fc' }}>{key}</td>
                                                        <td className="px-3 py-2 text-gray-900">{data.meta?.name || '—'}</td>
                                                        <td className="px-3 py-2 text-xs text-gray-500">{data.meta?.mac || '—'}</td>
                                                        <td className="px-3 py-2 text-center font-mono">{data.meta?.totalCodes?.toLocaleString() || (data.codes ? Object.keys(data.codes).length.toLocaleString() : '—')}</td>
                                                        <td className="px-3 py-2 text-center text-xs">{data.meta?.effectiveDate || '—'}</td>
                                                        <td className="px-3 py-2 text-center font-mono">${data.meta?.conversionFactor || '33.29'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                                <div className="mt-4 p-3 rounded-lg" style={{ background: 'rgba(192,132,252,0.05)', border: '1px solid rgba(192,132,252,0.15)' }}>
                                    <p className="text-xs" style={{ color: '#c084fc' }}><strong>Data Source:</strong> CMS Medicare Physician Fee Schedule (MPFS) Excel files per MAC jurisdiction. Download from <em>cms.gov/medicare/payment/physician-fee-schedule</em>.</p>
                                    <p className="text-xs mt-1" style={{ color: '#a78bfa' }}><strong>File:</strong> mpfs-data.js — Contains all loaded jurisdictions. To add a new jurisdiction, run the MPFS extraction tool with the CMS Excel file for that locality.</p>
                                    <p className="text-xs mt-1" style={{ color: '#a78bfa' }}><strong>Lookup Priority:</strong> MPFS Knowledge Base (direct CMS par amounts) → Static RVU Table (GPCI-adjusted calculation) → AI Estimated Reimbursement (dynamic fallback)</p>
                                </div>
                                {typeof MPFS_KNOWLEDGE_BASE !== 'undefined' && (
                                    <details className="mt-4" style={{ background: 'rgba(255,255,255,0.02)', borderRadius: 'var(--radius-md)', border: '1px solid rgba(255,255,255,0.06)' }}>
                                        <summary className="cursor-pointer px-4 py-3 text-sm font-semibold" style={{ color: '#f1f5f9' }}>Fee Schedule Lookup Tool</summary>
                                        <div className="px-4 pb-4">
                                            <p className="text-xs text-gray-500 mb-3">Test any CPT/HCPCS code against loaded MPFS jurisdictions.</p>
                                            <div className="flex gap-2 mb-3">
                                                <input id="mpfs-test-code" className="input" placeholder="CPT code (e.g. 99213)" style={{ maxWidth: '160px' }} />
                                                <select id="mpfs-test-state" className="input" style={{ maxWidth: '120px' }}>
                                                    {Object.keys(MPFS_KNOWLEDGE_BASE).map(k => <option key={k} value={MPFS_KNOWLEDGE_BASE[k].meta?.state || k}>{k} — {MPFS_KNOWLEDGE_BASE[k].meta?.state || ''}</option>)}
                                                </select>
                                                <select id="mpfs-test-pos" className="input" style={{ maxWidth: '140px' }}>
                                                    <option value="">Non-Facility</option>
                                                    <option value="21">21 - Inpatient Hospital</option>
                                                    <option value="22">22 - Outpatient Hospital</option>
                                                    <option value="23">23 - ER</option>
                                                    <option value="24">24 - ASC</option>
                                                    <option value="11">11 - Office</option>
                                                </select>
                                                <button className="btn btn-primary" onClick={() => {
                                                    const code = document.getElementById('mpfs-test-code').value.trim();
                                                    const state = document.getElementById('mpfs-test-state').value;
                                                    const pos = document.getElementById('mpfs-test-pos').value;
                                                    if (!code) return;
                                                    const result = lookupFeeSchedule(code, state, pos);
                                                    const el = document.getElementById('mpfs-test-result');
                                                    if (result) {
                                                        el.innerHTML = '<div style="color:#6ee7b7"><strong>' + code + '</strong> ' + (result.desc || '') + '<br/>Par Amount: <strong>$' + result.payment.toFixed(2) + '</strong> | Charge @200%: <strong style="color:#38bdf8">$' + (result.payment * 2).toFixed(2) + '</strong><br/>Source: ' + (result.source || 'N/A') + ' | Rate: ' + (result.rateType || '') + (result.facilityPar != null ? ' | Facility: $' + result.facilityPar : '') + (result.nonFacilityPar != null ? ' | Non-Fac: $' + result.nonFacilityPar : '') + '</div>';
                                                    } else {
                                                        el.innerHTML = '<div style="color:#f87171">Code <strong>' + code + '</strong> not found in MPFS or static table for ' + state + '</div>';
                                                    }
                                                }}>Lookup</button>
                                            </div>
                                            <div id="mpfs-test-result" className="text-sm font-mono p-2 rounded" style={{ background: 'rgba(0,0,0,0.2)', minHeight: '2rem' }}></div>
                                        </div>
                                    </details>
                                )}
                            </div>
                        </div>
                    </div>
                );
                default: return <Dashboard />;
            }
        };
        return (
            <div className="flex h-screen" style={{ background: 'linear-gradient(135deg, #0f0720 0%, #0c1222 40%, #091520 100%)' }}>
                {/* === PREMIUM SIDEBAR === */}
                <div className="sidebar" style={{ width: sidebarOpen ? '16.5rem' : '5rem' }}>
                    <div style={{ padding: '1.25rem 1rem', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3" style={{ justifyContent: !sidebarOpen ? 'center' : undefined, width: !sidebarOpen ? '100%' : undefined }}>
                                <div style={{ width: '2.5rem', height: '2.5rem', background: 'var(--gradient-accent)', borderRadius: 'var(--radius-md)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, color: '#fff', fontSize: '.7rem', letterSpacing: '0.05em', boxShadow: '0 2px 10px rgba(192,132,252,0.4)' }}>OH</div>
                                {sidebarOpen && <div><p style={{ fontWeight: 700, fontSize: '.875rem', color: '#fff', letterSpacing: '-0.01em' }}>VanguardRCM</p><p style={{ fontSize: '.7rem', color: 'rgba(255,255,255,0.45)', fontWeight: 500, marginTop: '1px' }}>RCM Platform</p></div>}
                            </div>
                            {sidebarOpen && <button onClick={() => setSidebarOpen(false)} style={{ background: 'rgba(255,255,255,0.06)', border: 'none', color: 'rgba(255,255,255,0.4)', cursor: 'pointer', borderRadius: 'var(--radius-sm)', width: '1.75rem', height: '1.75rem', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '.75rem', transition: 'all .2s' }}>‹</button>}
                        </div>
                    </div>
                    {sidebarOpen && <div style={{ padding: '.75rem 1rem 0', marginBottom: '-.25rem' }}><p style={{ fontSize: '.65rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'rgba(255,255,255,0.3)', padding: '0 .75rem' }}>Navigation</p></div>}
                    <nav className="flex-1 overflow-y-auto" style={{ padding: '.5rem .75rem' }}>
                        <div className="space-y-1">
                            {nav.map(item => (<button key={item.id} onClick={() => setPage(item.id)} className={`sidebar-item w-full flex items-center gap-3 rounded-lg ${page === item.id ? 'active' : ''}`} style={{ padding: '.625rem .75rem' }} title={!sidebarOpen ? item.label : ''}><span style={{ fontSize: '1.1rem', width: '1.5rem', textAlign: 'center' }}>{item.icon}</span>{sidebarOpen && <span style={{ fontSize: '.8125rem', fontWeight: page === item.id ? 600 : 500 }}>{item.label}</span>}</button>))}
                        </div>
                    </nav>
                    <div style={{ borderTop: '1px solid rgba(255,255,255,0.06)', padding: '1rem' }}>
                        {sidebarOpen ? <div style={{ display: 'flex', alignItems: 'center', gap: '.5rem', padding: '.5rem .75rem', background: 'rgba(255,255,255,0.04)', borderRadius: 'var(--radius-md)' }}><div style={{ width: '6px', height: '6px', borderRadius: '50%', background: '#6ee7b7', boxShadow: '0 0 6px rgba(16,185,129,0.5)' }} /><span style={{ fontSize: '.7rem', color: 'rgba(255,255,255,0.5)', fontWeight: 500 }}>v2.0 &middot; All systems operational</span></div> : <div style={{ display: 'flex', justifyContent: 'center' }}><div style={{ width: '6px', height: '6px', borderRadius: '50%', background: '#6ee7b7', boxShadow: '0 0 6px rgba(16,185,129,0.5)' }} /></div>}
                    </div>
                </div>
                {/* === MAIN CONTENT AREA === */}
                <div className="flex-1 flex flex-col" style={{ minWidth: 0 }}>
                    {/* === PREMIUM HEADER === */}
                    <div className="glass" style={{ borderBottom: '1px solid rgba(255,255,255,0.07)', position: 'sticky', top: 0, zIndex: 40 }}>
                        <div style={{ padding: '0.875rem 2rem' }} className="flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                {!sidebarOpen && <button onClick={() => setSidebarOpen(true)} style={{ background: 'rgba(255,255,255,0.05)', border: 'none', color: 'rgba(255,255,255,0.6)', cursor: 'pointer', borderRadius: 'var(--radius-sm)', width: '2rem', height: '2rem', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .2s' }}>›</button>}
                                <div>
                                    <h1 style={{ fontSize: '1.25rem', fontWeight: 700, color: '#f1f5f9', letterSpacing: '-0.02em' }}>VanguardRCM Platform</h1>
                                    <p style={{ fontSize: '.8rem', color: 'rgba(255,255,255,0.3)', marginTop: '1px' }}>Multi-Agent Revenue Cycle Automation</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div style={{ padding: '.375rem .875rem', background: 'rgba(52,211,153,0.12)', borderRadius: '9999px', display: 'flex', alignItems: 'center', gap: '.375rem' }}>
                                    <div style={{ width: '7px', height: '7px', borderRadius: '50%', background: '#6ee7b7', animation: 'pulse 2s infinite' }} />
                                    <span style={{ fontSize: '.75rem', fontWeight: 600, color: '#6ee7b7' }}>Live</span>
                                </div>
                                <button className="relative transition" style={{ background: 'rgba(255,255,255,0.05)', border: 'none', cursor: 'pointer', borderRadius: 'var(--radius-md)', width: '2.25rem', height: '2.25rem', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1rem' }}>🔔<span className="absolute" style={{ top: '.375rem', right: '.375rem', width: '.45rem', height: '.45rem', background: '#ef4444', borderRadius: '50%', border: '2px solid white' }}></span></button>
                                <div style={{ width: '1px', height: '1.5rem', background: 'rgba(255,255,255,0.07)' }} />
                                <div className="flex items-center gap-2" style={{ cursor: 'pointer' }}>
                                    <div style={{ width: '2.25rem', height: '2.25rem', background: 'var(--gradient-accent)', borderRadius: 'var(--radius-md)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, color: '#fff', fontSize: '.75rem', boxShadow: '0 2px 8px rgba(99,102,241,0.25)' }}>AW</div>
                                    <div><span style={{ fontSize: '.8125rem', fontWeight: 600, color: '#f1f5f9', display: 'block', lineHeight: 1.2 }}>Alicia Walker</span><span style={{ fontSize: '.7rem', color: 'rgba(255,255,255,0.3)' }}>Administrator</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    {/* === PAGE CONTENT === */}
                    <div className="flex-1 overflow-auto" style={{ background: 'linear-gradient(135deg, #0f0720 0%, #0c1222 40%, #091520 100%)' }}><div style={{ padding: '1.75rem 2rem' }}>{renderPage()}</div></div>
                    {/* === PREMIUM FOOTER === */}
                    <div style={{ padding: '.75rem 2rem', borderTop: '1px solid rgba(255,255,255,0.05)', background: 'rgba(15,20,35,0.95)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <p style={{ fontSize: '.7rem', color: 'rgba(255,255,255,0.3)' }}>&copy; 2026 VanguardRCM. All rights reserved.</p>
                        <p style={{ fontSize: '.7rem', color: 'rgba(255,255,255,0.1)' }}>Last synced: {new Date().toLocaleTimeString()}</p>
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
